<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>華語線上作業簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .hero{min-height:100vh;display:grid;place-items:center;padding:24px}
  .hero-card{max-width:620px;width:100%;text-align:center}
  .hero h1{font-size:32px;margin-bottom:8px}
  .hero p.lead{color:var(--muted);font-size:16px;margin:0 0 30px}
  .choose{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:540px){.choose{grid-template-columns:1fr}}
  .choice{display:block;background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:28px 22px;box-shadow:var(--shadow-sm);transition:.18s;color:var(--ink)}
  .choice:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--line-strong)}
  .choice .ic{width:60px;height:60px;border-radius:16px;display:grid;place-items:center;margin:0 auto 14px;
    font-family:var(--serif);font-size:30px;font-weight:700;color:#fff}
  .choice h2{font-size:20px;margin-bottom:6px}
  .choice p{color:var(--muted);font-size:14px;margin:0}
</style>
</head>
<body class="bg-pattern">
  <div class="hero"><div class="hero-card">
    <div class="brand-badge" style="width:58px;height:58px;font-size:30px;border-radius:16px;margin:0 auto 18px">華</div>
    <h1 id="title">華語線上作業簿</h1>
    <p class="lead">學生管理、課文教材、線上練習自動批改，一站搞定</p>
    <div class="choose">
      <a class="choice" href="teacher.html">
        <div class="ic" style="background:linear-gradient(135deg,#B23A48,#8E2B38)">師</div>
        <h2>教師管理後台</h2>
        <p>管理學生、上傳課文與音檔、出練習題、看成績</p>
      </a>
      <a class="choice" href="student.html">
        <div class="ic" style="background:linear-gradient(135deg,#1F6F78,#0E7C86)">學</div>
        <h2>學生作業簿</h2>
        <p>看課文、聽音檔、線上做練習、即時看分數</p>
      </a>
    </div>
    <p class="foot-note" style="margin-top:34px">第一次使用請先閱讀「部署與使用指南」</p>
  </div></div>
<script src="config.js"></script>
<script>document.getElementById('title').textContent=window.APP_NAME||'華語線上作業簿';</script>
</body>
</html>
