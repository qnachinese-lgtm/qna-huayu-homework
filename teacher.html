<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>教師管理 · 華語線上作業簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-pattern">

  <div id="gate" class="login-wrap">
    <div class="login-card">
      <div class="brand-badge">師</div>
      <h1>教師管理後台</h1>
      <p class="sub" id="gate-sub">華語線上作業簿</p>
      <div class="field hide" id="f-email-wrap"><label>教師 Email</label><input id="gate-email" type="email" placeholder="you@example.com" autocomplete="username"></div>
      <div class="field"><label>密碼</label><input id="gate-pw" type="password" placeholder="請輸入密碼" autocomplete="current-password"></div>
      <div class="err" id="gate-err"></div>
      <button class="btn btn-primary" style="width:100%" id="gate-btn">登入</button>
      <button class="btn btn-ghost hide" style="width:100%;margin-top:8px;font-size:13px" id="gate-forgot">忘記密碼？寄送重設信</button>
      <p class="sub" style="margin:18px 0 0;font-size:12px">學生請改用「學生頁面」(student.html)</p>
    </div>
  </div>

  <div id="app" class="hide">
    <div class="topbar"><div class="topbar-inner">
      <div class="brand"><div class="brand-badge">師</div>
        <div><div class="brand-title" id="app-name">華語線上作業簿</div><div class="brand-sub">教師管理後台</div></div></div>
      <div class="topbar-spacer"></div>
      <span class="mode-tag" id="mode-tag"></span>
      <button class="btn btn-sm btn-ghost" data-act="logout">登出</button>
    </div></div>

    <div class="container">
      <div class="tabs">
        <button class="tab" data-act="tab" data-id="dashboard">📊 總覽</button>
        <button class="tab" data-act="tab" data-id="students">學生名冊 <span class="count" id="c-students">0</span></button>
        <button class="tab" data-act="tab" data-id="lessons">課文練習 <span class="count" id="c-lessons">0</span></button>
        <button class="tab" data-act="tab" data-id="grades">成績總覽</button>
      </div>

      <section id="panel-dashboard" class="panel">
        <div class="section-head"><h2>📊 總覽</h2><span class="sub">付款提醒與學生進度</span></div>
        <div id="dashboard-body"></div>
      </section>

      <section id="panel-students" class="panel hide">
        <div class="section-head"><h2>學生名冊</h2><span class="sub">基本資料與學費</span><span class="grow"></span>
          <input id="stu-search" type="text" placeholder="搜尋名字 / 國籍…" style="max-width:190px">
          <button class="btn btn-primary" data-act="addStudent">＋ 新增學生</button></div>
        <div id="students-list" class="cards cols-2"></div>
      </section>

      <section id="panel-lessons" class="panel hide">
        <div class="section-head"><h2>課文與練習</h2><span class="sub">上傳課文、音檔、出練習題；也可只出作業（課文留空）</span><span class="grow"></span>
          <button class="btn btn-primary" data-act="addLesson">＋ 新增課文／作業</button></div>
        <div id="lessons-list" class="cards"></div>
      </section>

      <section id="panel-grades" class="panel hide">
        <div class="section-head"><h2>成績總覽</h2><span class="sub">每位學生每課的完成與分數</span></div>
        <div id="grades-list" class="cards"></div>
      </section>

      <div class="foot-note">華語線上作業簿 · 教師後台</div>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script>
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const esc=(s)=>(s==null?"":String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function fmtDate(d){if(!d)return'—';const x=new Date(d);if(isNaN(x))return d;return x.getFullYear()+'/'+String(x.getMonth()+1).padStart(2,'0')+'/'+String(x.getDate()).padStart(2,'0');}
const CUR={TWD:['NT$','zh-TW'],VND:['₫','vi-VN'],USD:['US$','en-US']};
function money(n,cur){if(n==null||n==='')return'—';const v=Number(n);if(isNaN(v))return n;const c=CUR[cur||'TWD']||CUR.TWD;return c[0]+v.toLocaleString(c[1]);}
const DAYS=['週一','週二','週三','週四','週五','週六','週日'];
function fmtSchedule(s){if(s&&Array.isArray(s.schedule)&&s.schedule.length){return s.schedule.map(r=>(DAYS[(r.d!=null?r.d:0)]||'')+' '+(r.s||'')+(r.e?'–'+r.e:'')).join('、');}return (s&&s.class_time)||'—';}
function schedRowHTML(r){r=r||{};return `<div class="sched-row">
  <select class="sched-d">${DAYS.map((d,i)=>`<option value="${i}"${r.d===i?' selected':''}>${d}</option>`).join('')}</select>
  <input class="sched-s" type="time" value="${esc(r.s||'')}"><span class="sched-dash">–</span><input class="sched-e" type="time" value="${esc(r.e||'')}">
  <button class="btn btn-sm btn-ghost sched-x" type="button" data-act="schedDel" aria-label="刪除時段">✕</button></div>`;}
const AV=['#B23A48','#1F6F78','#C9A227','#5B6BB5','#2F855A','#C05621','#7B4DAA','#0E7C86'];
function avColor(s){let h=0;for(const c of (s||''))h=(h*31+c.charCodeAt(0))>>>0;return AV[h%AV.length];}
function genCodeStr(){const c='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<4;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function dueInfo(due){if(!due)return null;const t=new Date();t.setHours(0,0,0,0);const d=new Date(due);d.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  if(diff<0)return{cls:'badge-overdue',label:'已過期 · '+fmtDate(due)};
  if(diff===0)return{cls:'badge-soon',label:'今天截止'};
  if(diff<=3)return{cls:'badge-soon',label:diff+' 天後截止'};
  return{cls:'badge-pending',label:'截止 '+fmtDate(due)};}
function emptyHtml(i,t,d){return `<div class="empty"><div class="big">${i}</div><b>${t}</b><div style="margin-top:6px">${d}</div></div>`;}
const TYPE_LABELS={choice:'單選',fill:'填空',order:'重組',match:'配對',write:'手寫',speak:'口說'};

const S={students:[],lessons:[],questions:[],results:[],tab:'dashboard',q:''};
const sortLessons=(a)=>a.slice().sort((x,y)=>((x.order_index||0)-(y.order_index||0))||((x.created_at||'').localeCompare(y.created_at||'')));
const questionsOf=(lid)=>S.questions.filter(q=>q.lesson_id===lid).sort((a,b)=>(a.order_index||0)-(b.order_index||0));
const resultOf=(lid,sid)=>S.results.find(r=>r.lesson_id===lid&&r.student_id===sid);
function scoreOf(l,r){const qs=questionsOf(l.id);const manual=r.manual||{};let md=0;qs.forEach(q=>{if((q.type==='write'||q.type==='speak')&&manual[q.id]==='done')md++;});return (r.auto!=null?r.auto:(r.score||0))+md;}

async function loadAll(){
  const [a,b,c,d]=await Promise.all([DB.list('students'),DB.list('lessons'),DB.list('questions'),DB.list('results')]);
  S.students=a;S.lessons=b;S.questions=c;S.results=d;
}
function openModal(h){$('#modal-root').innerHTML=`<div class="overlay" data-overlay>${h}</div>`;}
function closeModal(){$('#modal-root').innerHTML='';}

function render(){
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===S.tab));
  $('#c-students').textContent=S.students.length;
  $('#c-lessons').textContent=S.lessons.length;
  $$('.panel').forEach(p=>p.classList.add('hide'));
  $('#panel-'+S.tab).classList.remove('hide');
  ({dashboard:renderDashboard,students:renderStudents,lessons:renderLessons,grades:renderGrades}[S.tab])();
}
function payInfo(due){if(!due)return null;const t=new Date();t.setHours(0,0,0,0);const d=new Date(due);if(isNaN(d))return null;d.setHours(0,0,0,0);const diff=Math.round((d-t)/86400000);
  if(diff<0)return{cls:'badge-overdue',label:'已逾期 '+(-diff)+' 天',sort:diff};
  if(diff===0)return{cls:'badge-soon',label:'今天到期',sort:0};
  if(diff<=7)return{cls:'badge-soon',label:diff+' 天後到期',sort:diff};
  return null;}
function studentProgress(s){const assigned=S.lessons.filter(l=>(l.assigned_ids||[]).includes(s.id)&&questionsOf(l.id).length);
  let done=0,pct=0,scored=0,sumPct=0;
  assigned.forEach(l=>{const r=resultOf(l.id,s.id);if(r){if(r.status==='done')done++;const tot=r.total||questionsOf(l.id).length;if(tot){sumPct+=Math.round(scoreOf(l,r)/tot*100);scored++;}}});
  pct=assigned.length?Math.round(done/assigned.length*100):0;
  return{total:assigned.length,done,pct,avg:scored?Math.round(sumPct/scored):null};}
function renderDashboard(){
  const body=$('#dashboard-body');
  if(!S.students.length){body.innerHTML=emptyHtml('📊','還沒有資料','先到「學生名冊」新增學生。');return;}
  // 付款提醒
  const pays=S.students.map(s=>({s,info:payInfo(s.payment_date)})).filter(x=>x.info).sort((a,b)=>a.info.sort-b.info.sort);
  const payHtml=pays.length?pays.map(({s,info})=>`<div class="dash-row">
      <span class="avatar sm" style="background:${avColor(s.name)}">${esc((s.name||'?').slice(0,2))}</span>
      <b>${esc(s.name)}</b><span class="badge ${info.cls}">${info.label}</span>
      <span class="grow"></span><span class="muted">${money(s.tuition,s.currency)} · ${fmtDate(s.payment_date)}</span>
      ${s.email?`<button class="btn btn-sm" data-act="resetPw" data-id="${s.id}" title="寄重設密碼信">✉️</button>`:''}
    </div>`).join(''):`<div class="muted" style="padding:8px 2px">目前沒有即將到期或逾期的付款 👍</div>`;
  // 進度
  const progHtml=S.students.map(s=>{const p=studentProgress(s);
    return `<div class="dash-row">
      <span class="avatar sm" style="background:${avColor(s.name)}">${esc((s.name||'?').slice(0,2))}</span>
      <b>${esc(s.name)}</b>
      <span class="grow"></span>
      <span class="muted">${p.total?`完成 ${p.done}/${p.total} 課${p.avg!=null?(' · 平均 '+p.avg+'%'):''}`:'尚未指派作業'}</span>
      <span class="progbar"><span style="width:${p.pct}%"></span></span>
    </div>`;}).join('');
  body.innerHTML=`<div class="card"><div class="lesson-label">💳 付款提醒</div>${payHtml}</div>
    <div class="card" style="margin-top:14px"><div class="lesson-label">📈 學生進度</div>${progHtml}</div>`;
}

/* ---------- 學生名冊 ---------- */
function renderStudents(){
  const wrap=$('#students-list');let list=S.students;
  if(S.q){const q=S.q.toLowerCase();list=list.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.nationality||'').toLowerCase().includes(q));}
  if(!S.students.length){wrap.className='';wrap.innerHTML=emptyHtml('👩‍🏫','還沒有學生','點「新增學生」建立第一位。');return;}
  if(!list.length){wrap.className='';wrap.innerHTML=emptyHtml('🔍','找不到符合的學生','換個關鍵字。');return;}
  wrap.className='cards cols-2';
  wrap.innerHTML=list.map(s=>`<div class="card student-card">
    <div class="row-between"><div style="display:flex;gap:12px;align-items:center">
      <div class="avatar" style="background:${avColor(s.name)}">${esc((s.name||'?').slice(0,2))}</div>
      <div><div class="name">${esc(s.name)}</div>
        <div style="margin-top:3px;display:flex;gap:6px;flex-wrap:wrap"><span class="tag accent">${esc(s.class_type||'1對1')}</span>${s.nationality?`<span class="tag">${esc(s.nationality)}</span>`:''}</div></div></div>
      <div class="actions"><button class="btn btn-sm" data-act="editStudent" data-id="${s.id}">編輯</button>
        <button class="btn btn-sm btn-danger" data-act="delStudent" data-id="${s.id}">刪除</button></div></div>
    <div class="meta" style="margin-top:14px"><span>📖 教材：<b>${esc(s.textbook||'—')}</b></span><span>🕒 上課：<b>${esc(fmtSchedule(s))}</b></span>
      <span>💰 學費：<b>${money(s.tuition,s.currency)}</b></span><span>📅 付款日：<b>${fmtDate(s.payment_date)}</b></span><span>✉️ Email：<b>${esc(s.email||'—')}</b></span></div>
    ${s.email?`<div class="meta" style="margin-top:8px;align-items:center">${s.reset_requested?'<span class="badge badge-soon">🔑 學生申請重設</span>':''}<button class="btn btn-sm" data-act="resetPw" data-id="${s.id}">✉️ 寄重設密碼信</button></div>`:''}
    ${s.notes?`<div class="meta" style="margin-top:8px"><span>📝 ${esc(s.notes)}</span></div>`:''}</div>`).join('');
}
function studentModal(st){const e=!!st;st=st||{};
  openModal(`<div class="modal"><div class="modal-head"><h3>${e?'編輯學生':'新增學生'}</h3><button class="x" data-act="closeModal">×</button></div>
   <div class="modal-body"><div class="form-grid">
     <div class="field"><label>名字 *</label><input id="f-name" type="text" value="${esc(st.name||'')}"></div>
     <div class="field"><label>國籍</label><input id="f-nat" type="text" value="${esc(st.nationality||'')}" placeholder="例：美國"></div>
     <div class="field full"><label>使用教材</label><input id="f-book" type="text" value="${esc(st.textbook||'')}" placeholder="例：當代中文課程 1"></div>
     <div class="field"><label>班別</label><select id="f-type"><option ${st.class_type==='1對1'?'selected':''}>1對1</option><option ${st.class_type==='團班'?'selected':''}>團班</option></select></div>
     <div class="field full"><label>上課時段 <span class="hint">一週可多個，依學生實際安排（例：週三 20:00–22:00、週五 15:00–17:00）</span></label>
       <div id="sched-rows">${(Array.isArray(st.schedule)&&st.schedule.length?st.schedule:[{}]).map(r=>schedRowHTML(r)).join('')}</div>
       <button class="btn btn-sm" type="button" data-act="schedAdd" style="margin-top:6px">＋ 新增時段</button></div>
     <div class="field"><label>付款日期</label><input id="f-pay" type="date" value="${esc(st.payment_date||'')}"></div>
     <div class="field"><label>學費</label><input id="f-fee" type="number" value="${st.tuition??''}" placeholder="例：800"></div>
     <div class="field"><label>幣別</label><select id="f-cur"><option value="TWD"${(st.currency||'TWD')==='TWD'?' selected':''}>臺幣 NT$</option><option value="VND"${st.currency==='VND'?' selected':''}>越南盾 ₫</option><option value="USD"${st.currency==='USD'?' selected':''}>美元 US$</option></select></div>
     ${e
       ? `<div class="field full"><label>Email（登入帳號）</label><input id="f-email" type="email" value="${esc(st.email||'')}" disabled style="opacity:.65"><span class="hint">建立後不可更改；要改密碼請按卡片上的「寄重設密碼信」</span></div>`
       : `<div class="field"><label>Email（登入帳號）*</label><input id="f-email" type="email" value="" placeholder="student@example.com" autocomplete="off"></div>
     <div class="field"><label>初始密碼 *</label><input id="f-pw" type="text" value="" placeholder="至少 6 碼，告訴學生"></div>
     <div class="field full"><span class="hint">系統會用這個 Email 與密碼為學生建立安全登入帳號；密碼不會存進資料庫。</span></div>`}
     <div class="field full"><label>備註</label><textarea id="f-notes" style="min-height:60px">${esc(st.notes||'')}</textarea></div>
   </div></div>
   <div class="modal-foot"><button class="btn btn-ghost" data-act="closeModal">取消</button>
     <button class="btn btn-primary" data-act="saveStudent" data-id="${st.id||''}">${e?'儲存':'新增'}</button></div></div>`);
}

/* ---------- 課文與練習 ---------- */
function renderLessons(){
  const wrap=$('#lessons-list');const ls=sortLessons(S.lessons);
  if(!ls.length){wrap.innerHTML=emptyHtml('📚','還沒有內容','點「新增課文／作業」：可放課文＋練習題，或只出補充作業（課文留空）。');return;}
  wrap.innerHTML=ls.map((l,i)=>{
    const vocab=(l.vocabulary||'').split('\n').map(v=>v.trim()).filter(Boolean);
    const qn=questionsOf(l.id).length, an=(l.assigned_ids||[]).length, di=dueInfo(l.due_date);
    return `<div class="card">
      <div class="row-between"><div style="display:flex;gap:14px;align-items:center">
        <div class="lesson-no">${l.order_index||i+1}</div>
        <div><h3>${esc(l.title)}</h3><div class="meta" style="margin-top:5px;align-items:center">
          <span>📝 ${qn} 題</span><span>📖 生字 ${vocab.length}</span>${l.audio_url?'<span class="tag gold">🔊 有音檔</span>':''}
          <span>👤 指派 ${an}</span>${di?`<span class="badge ${di.cls}">${di.label}</span>`:''}</div></div></div></div>
      <div class="actions" style="margin-top:14px;flex-wrap:wrap">
        <button class="btn btn-sm" data-act="editLesson" data-id="${l.id}">編輯課文</button>
        <button class="btn btn-sm btn-accent" data-act="questions" data-id="${l.id}">練習題（${qn}）</button>
        <button class="btn btn-sm" data-act="assign" data-id="${l.id}">指派</button>
        <button class="btn btn-sm btn-danger" data-act="delLesson" data-id="${l.id}">刪除</button></div></div>`;}).join('');
}
function lessonModal(l){const e=!!l;l=l||{};const nextNo=S.lessons.length+1;
  openModal(`<div class="modal wide"><div class="modal-head"><h3>${e?'編輯課文':'新增課文'}</h3><button class="x" data-act="closeModal">×</button></div>
   <div class="modal-body"><div class="form-grid">
     <div class="field"><label>課序 <span class="hint">第幾課</span></label><input id="l-order" type="number" min="1" value="${l.order_index||nextNo}"></div>
     <div class="field"><label>課名 *</label><input id="l-title" type="text" value="${esc(l.title||'')}" placeholder="例：第一課 歡迎你來臺灣／補充作業 6-20"></div></div>
     <div class="hint" style="margin:-2px 0 10px">只想出補充作業？課名填一下即可，下面課文／生字／重點全部留空，存好後在卡片點「練習題」出題。</div>
     <div class="field"><label>課文內容 <span class="hint">選填</span></label><textarea id="l-content" style="min-height:130px" placeholder="貼上或輸入課文…">${esc(l.content||'')}</textarea></div>
     <div class="field"><label>生字 <span class="hint">每行一個</span></label><textarea id="l-vocab" placeholder="歡迎&#10;臺灣&#10;朋友">${esc(l.vocabulary||'')}</textarea></div>
     <div class="field"><label>語法 / 重點</label><textarea id="l-key" placeholder="例：「先…再…」的用法">${esc(l.key_points||'')}</textarea></div>
     <div class="field"><label>課文音檔 <span class="hint">選填</span></label>
       <div style="display:flex;gap:8px;flex-wrap:wrap"><input id="l-audio" type="text" style="flex:1;min-width:160px" value="${esc(l.audio_url||'')}" placeholder="上傳檔案，或貼 mp3／YouTube 連結">
       <button class="btn" type="button" data-act="pickAudio" data-id="l-audio">⬆ 上傳音檔</button></div>
       <input type="file" id="file-l-audio" class="audio-file hide" accept="audio/*" data-target="l-audio" data-status="status-l-audio">
       <div class="hint" id="status-l-audio" style="margin-top:4px"></div></div>
   </div>
   <div class="modal-foot"><button class="btn btn-ghost" data-act="closeModal">取消</button>
     <button class="btn btn-primary" data-act="saveLesson" data-id="${l.id||''}">${e?'儲存':'新增'}</button></div></div>`);
}

/* ---------- 練習題管理 ---------- */
function openQuestionsModal(lid){
  const l=S.lessons.find(x=>x.id===lid);if(!l)return;const qs=questionsOf(lid);
  const rows=qs.length?qs.map((q,i)=>`<div class="qe-row"><span class="q-num">${i+1}</span>

let QE_TYPE='choice';
function qeFieldsHTML(type,q){q=q||{};const opt=q.options||[];
  if(type==='choice'){const lines=Array.isArray(opt)?opt.join('\n'):'';const correct=(typeof q.answer==='number')?(q.answer+1):'';
    return `<div class="field"><label>選項 <span class="hint">每行一個</span></label><textarea id="qe-options" placeholder="選項一&#10;選項二&#10;選項三">${esc(lines)}</textarea></div>
      <div class="field"><label>正確答案 <span class="hint">填第幾個選項（1、2、3…）</span></label><input id="qe-correct" type="number" min="1" value="${correct}"></div>`;}
  if(type==='fill'){const acc=Array.isArray(q.answer)?q.answer.join('\n'):'';
    return `<div class="hint" style="margin-bottom:8px">提示：題目中用 <b>___</b>（三條底線）代表填空處。</div>
      <div class="field"><label>可接受答案 <span class="hint">每行一個；學生作答相符即算對（不分大小寫、空格）</span></label><textarea id="qe-accept" placeholder="謝謝&#10;謝謝你">${esc(acc)}</textarea></div>`;}
  if(type==='order'){const segs=Array.isArray(opt)?opt.join('\n'):'';
    return `<div class="field"><label>正確順序 <span class="hint">每行一個詞／字，依正確順序</span></label><textarea id="qe-segs" placeholder="我&#10;每天&#10;喝&#10;咖啡">${esc(segs)}</textarea>
      <div class="hint" style="margin-top:4px">學生會看到打散的詞，要排回正確順序。</div></div>`;}
  if(type==='write'){const ref=Array.isArray(q.answer)?q.answer.join(''):'';
    return `<div class="hint" style="margin-bottom:8px">學生會看到上面的「題目」並在格子裡手寫漢字（例如題目寫「請寫出：謝謝（xièxie）」）。送出後你在「成績總覽」批改。</div>
      <div class="field"><label>參考答案 <span class="hint">選填，批改時顯示給你對照，例如「謝謝」</span></label><input id="qe-ref" type="text" value="${esc(ref)}"></div>`;}
  if(type==='speak'){return `<div class="hint" style="margin-bottom:8px">學生會看到上面的「題目」，按麥克風錄一段唸給你聽；送出後你在「成績總覽」播放並批改。可在下方「聽力音檔」放一段示範發音給學生跟讀（選填）。</div>`;}
  const pairs=Array.isArray(opt)?opt.map(p=>`${p.l}=${p.r}`).join('\n'):'';
  return `<div class="field"><label>配對 <span class="hint">每行「左=右」</span></label><textarea id="qe-pairs" placeholder="你好=Hello&#10;謝謝=Thank you&#10;再見=Goodbye">${esc(pairs)}</textarea></div>`;
}

function renderGrades(){
  const wrap=$('#grades-list');const ls=sortLessons(S.lessons).filter(l=>(l.assigned_ids||[]).length);
  if(!ls.length){wrap.innerHTML=emptyHtml('📊','還沒有成績','到「課文練習」指派課文給學生，學生作答後這裡會顯示分數。');return;}
  wrap.innerHTML=ls.map(l=>{
    const targets=(l.assigned_ids||[]).map(id=>S.students.find(s=>s.id===id)).filter(Boolean);
    const qs=questionsOf(l.id);const qn=qs.length;const writeQs=qs.filter(q=>q.type==='write'||q.type==='speak');
    const rows=targets.map(s=>{const r=resultOf(l.id,s.id);const pend=r&&r.status==='pending';
      return `<tr><td><span class="dot ${r&&!pend?'ok':'no'}"></span>${esc(s.name)}</td>
        <td>${!r?'<span class="badge badge-pending">未開始</span>':(pend?'<span class="badge badge-soon">待批改</span>':'<span class="badge badge-ok">已完成</span>')}</td>
        <td><b>${r?(scoreOf(l,r)+'/'+(r.total||qn)):'—'}</b></td></tr>`;}).join('');
    const doneCount=targets.filter(s=>{const r=resultOf(l.id,s.id);return r&&r.status==='done';}).length;
    let hwSection='';
    if(writeQs.length){
      const reviewed=targets.map(s=>{const r=resultOf(l.id,s.id);if(!r)return '';
        const blocks=writeQs.map(q=>{const resp=(r.answers||{})[q.id];const mk=(r.manual||{})[q.id];
          const media=q.type==='speak'?(resp?`<audio class="rec-audio" controls src="${esc(resp)}"></audio>`:'<div class="hint">（未作答）</div>'):(resp?`<img class="hw-img" src="${resp}" alt="">`:'<div class="hint">（未作答）</div>');
          return `<div class="hw-review"><div class="meta"><span class="tag accent">${TYPE_LABELS[q.type]}</span> <b>${esc(q.prompt||'')}</b>${q.type==='write'&&q.answer&&q.answer.length?` <span class="tag gold">參考：${esc(q.answer.join(''))}</span>`:''}</div>
            ${media}
            <div class="hw-tools" style="margin-top:8px">
              <button class="btn btn-sm ${mk==='done'?'btn-accent':''}" data-act="markWrite" data-id="${r.id}::${q.id}::done">✓ 正確</button>
              <button class="btn btn-sm ${mk==='wrong'?'btn-danger':''}" data-act="markWrite" data-id="${r.id}::${q.id}::wrong">✗ 錯誤</button>
              <span class="hint">${mk?('已標記：'+(mk==='done'?'正確':'錯誤')):'尚未批改'}</span>
            </div></div>`;}).join('');
        return `<div style="margin-top:12px"><div class="meta" style="margin-bottom:6px"><b>${esc(s.name)}</b></div>${blocks}</div>`;}).filter(Boolean).join('');
      hwSection=`<details class="disc" style="margin-top:14px"><summary>✍️🎙️ 批改手寫／口說（${writeQs.length} 題）</summary>${reviewed||'<div class="hint" style="margin-top:8px">還沒有人作答手寫／口說題。</div>'}</details>`;
    }
    return `<div class="card"><div class="row-between"><div>
      <h3 style="font-size:17px">${l.order_index?('第'+l.order_index+'課 · '):''}${esc(l.title)}</h3>
      <div class="meta" style="margin-top:5px"><span>${qn} 題</span><span>完成 <b>${doneCount}/${targets.length}</b></span></div></div></div>
      <div style="overflow:auto;margin-top:12px"><table class="matrix"><thead><tr><th>學生</th><th>狀態</th><th>分數</th></tr></thead><tbody>${rows}</tbody></table></div>
      ${hwSection}</div>`;}).join('');
}

document.addEventListener('change',async(e)=>{
  const inp=e.target;if(!inp||!inp.classList||!inp.classList.contains('audio-file'))return;
  const file=inp.files&&inp.files[0];if(!file)return;
  const target=document.getElementById(inp.dataset.target),status=document.getElementById(inp.dataset.status);
  const setS=v=>{if(status)status.textContent=v;};
  if(!(window.firebase&&firebase.storage)){setS('未連 Firebase Storage，無法上傳；可改貼網址。');return;}
  if(file.size>25*1024*1024){setS('檔案太大（上限 25MB），請壓縮或改貼網址。');return;}
  try{setS('上傳中… 0%');
    const safe=file.name.replace(/[^\w.\-]/g,'_');
    const ref=firebase.storage().ref('audio/'+Date.now()+'_'+safe);
    const task=ref.put(file);
    task.on('state_changed',snap=>{const p=Math.round(snap.bytesTransferred/snap.totalBytes*100);setS('上傳中… '+p+'%');});
    await task;
    const url=await ref.getDownloadURL();
    if(target)target.value=url;
    setS('✓ 上傳完成');
  }catch(err){setS('上傳失敗：'+((err&&err.message)||err));}
});

function authErr(e){const c=(e&&e.code)||'';
  if(c.indexOf('wrong-password')>=0||c.indexOf('invalid-credential')>=0)return '密碼不正確';
  if(c.indexOf('user-not-found')>=0)return '查無此帳號';
  if(c.indexOf('invalid-email')>=0)return 'Email 格式不正確';
  if(c.indexOf('too-many-requests')>=0)return '嘗試太多次，請稍後再試';
  return (e&&e.message)||'登入失敗';}
function boot(){$('#app-name').textContent=window.APP_NAME||'華語線上作業簿';$('#gate-sub').textContent=window.APP_NAME||'華語線上作業簿';
  const tag=$('#mode-tag');if(DB.mode!=='local'){tag.textContent='● 雲端同步';tag.classList.remove('demo');}else{tag.textContent='● 示範模式（本機）';tag.classList.add('demo');}
  if(useAuth){$('#f-email-wrap').classList.remove('hide');$('#gate-forgot').classList.remove('hide');if(window.TEACHER_EMAIL)$('#gate-email').value=window.TEACHER_EMAIL;}}
async function enter(){$('#gate').classList.add('hide');$('#app').classList.remove('hide');try{await loadAll();render();}catch(e){toast('讀取失敗：'+e.message);}}
async function tryLogin(){
  if(useAuth){const email=$('#gate-email').value.trim(),pw=$('#gate-pw').value;
    if(!email||!pw){$('#gate-err').textContent='請輸入 Email 與密碼';return;}
    $('#gate-err').textContent='登入中…';
    try{const cred=await firebase.auth().signInWithEmailAndPassword(email,pw);
      if((cred.user.email||'').toLowerCase()!==TEACHER_EMAIL){await firebase.auth().signOut();$('#gate-err').textContent='此帳號沒有教師權限';return;}
      $('#gate-err').textContent='';
    }catch(e){$('#gate-err').textContent=authErr(e);}
  }else{const pw=$('#gate-pw').value;if(pw&&pw===(window.TEACHER_PASSWORD||'')){sessionStorage.setItem('teacher_ok','1');enter();}else{$('#gate-err').textContent='密碼不正確';}}
}
async function forgot(){const email=$('#gate-email').value.trim()||window.TEACHER_EMAIL||'';
  if(!email){$('#gate-err').textContent='請先輸入 Email';return;}
  try{await firebase.auth().sendPasswordResetEmail(email);toast('已寄出重設密碼信，請到信箱收信（含垃圾信匣）');$('#gate-err').textContent='';}
  catch(e){$('#gate-err').textContent=authErr(e);}}
$('#gate-btn').addEventListener('click',tryLogin);
$('#gate-forgot').addEventListener('click',forgot);
$('#gate-pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
$('#stu-search').addEventListener('input',e=>{S.q=e.target.value.trim();renderStudents();});
boot();
if(useAuth){firebase.auth().onAuthStateChanged(function(user){if(user&&(user.email||'').toLowerCase()===TEACHER_EMAIL){if($('#app').classList.contains('hide'))enter();}});}
else{if(sessionStorage.getItem('teacher_ok')==='1')enter();}
</script>
</body>
</html>
