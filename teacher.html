<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>教師管理 · 華語線上作業簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-pattern">

  <div id="gate" class="login-wrap">
    <div class="login-card">
      <div class="brand-badge">師</div>
      <h1>教師管理後台</h1>
      <p class="sub" id="gate-sub">華語線上作業簿</p>
      <div class="field hide" id="f-email-wrap"><label>教師 Email</label><input id="gate-email" type="email" placeholder="you@example.com" autocomplete="username"></div>
      <div class="field"><label>密碼</label><input id="gate-pw" type="password" placeholder="請輸入密碼" autocomplete="current-password"></div>
      <div class="err" id="gate-err"></div>
      <button class="btn btn-primary" style="width:100%" id="gate-btn">登入</button>
      <button class="btn btn-ghost hide" style="width:100%;margin-top:8px;font-size:13px" id="gate-forgot">忘記密碼？寄送重設信</button>
      <p class="sub" style="margin:18px 0 0;font-size:12px">學生請改用「學生頁面」(student.html)</p>
    </div>
  </div>

  <div id="app" class="hide">
    <div class="topbar"><div class="topbar-inner">
      <div class="brand"><div class="brand-badge">師</div>
        <div><div class="brand-title" id="app-name">華語線上作業簿</div><div class="brand-sub">教師管理後台</div></div></div>
      <div class="topbar-spacer"></div>
      <span class="mode-tag" id="mode-tag"></span>
      <button class="btn btn-sm btn-ghost" data-act="logout">登出</button>
    </div></div>

    <div class="container">
      <div class="tabs">
        <button class="tab" data-act="tab" data-id="dashboard">📊 總覽</button>
        <button class="tab" data-act="tab" data-id="students">學生名冊 <span class="count" id="c-students">0</span></button>
        <button class="tab" data-act="tab" data-id="lessons">課文練習 <span class="count" id="c-lessons">0</span></button>
        <button class="tab" data-act="tab" data-id="grades">成績總覽</button>
      </div>

      <section id="panel-dashboard" class="panel">
        <div class="section-head"><h2>📊 總覽</h2><span class="sub">付款提醒與學生進度</span></div>
        <div id="dashboard-body"></div>
      </section>

      <section id="panel-students" class="panel hide">
        <div class="section-head"><h2>學生名冊</h2><span class="sub">基本資料與學費</span><span class="grow"></span>
          <input id="stu-search" type="text" placeholder="搜尋名字 / 國籍…" style="max-width:190px">
          <button class="btn btn-primary" data-act="addStudent">＋ 新增學生</button></div>
        <div id="students-list" class="cards cols-2"></div>
      </section>

      <section id="panel-lessons" class="panel hide">
        <div class="section-head"><h2>課文與練習</h2><span class="sub">上傳課文、音檔、出練習題；也可只出作業（課文留空）</span><span class="grow"></span>
          <button class="btn btn-primary" data-act="addLesson">＋ 新增課文／作業</button></div>
        <div id="lessons-list" class="cards"></div>
      </section>

      <section id="panel-grades" class="panel hide">
        <div class="section-head"><h2>成績總覽</h2><span class="sub">每位學生每課的完成與分數</span></div>
        <div id="grades-list" class="cards"></div>
      </section>

      <div class="foot-note">華語線上作業簿 · 教師後台</div>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script>
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const esc=(s)=>(s==null?"":String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function fmtDate(d){if(!d)return'—';const x=new Date(d);if(isNaN(x))return d;return x.getFullYear()+'/'+String(x.getMonth()+1).padStart(2,'0')+'/'+String(x.getDate()).padStart(2,'0');}
const CUR={TWD:['NT$','zh-TW'],VND:['₫','vi-VN'],USD:['US$','en-US']};
function money(n,cur){if(n==null||n==='')return'—';const v=Number(n);if(isNaN(v))return n;const c=CUR[cur||'TWD']||CUR.TWD;return c[0]+v.toLocaleString(c[1]);}
const DAYS=['週一','週二','週三','週四','週五','週六','週日'];
function fmtSchedule(s){if(s&&Array.isArray(s.schedule)&&s.schedule.length){return s.schedule.map(r=>(DAYS[(r.d!=null?r.d:0)]||'')+' '+(r.s||'')+(r.e?'–'+r.e:'')).join('、');}return (s&&s.class_time)||'—';}
function schedRowHTML(r){r=r||{};return `<div class="sched-row">
  <select class="sched-d">${DAYS.map((d,i)=>`<option value="${i}"${r.d===i?' selected':''}>${d}</option>`).join('')}</select>
  <input class="sched-s" type="time" value="${esc(r.s||'')}"><span class="sched-dash">–</span><input class="sched-e" type="time" value="${esc(r.e||'')}">
  <button class="btn btn-sm btn-ghost sched-x" type="button" data-act="schedDel" aria-label="刪除時段">✕</button></div>`;}
function firstSlotOptions(st){const sch=(Array.isArray(st&&st.schedule)?st.schedule:[]).filter(r=>r&&(r.s||r.e));const sel=st&&st.first_slot;
  return '<option value="">（第一個時段／自動）</option>'+sch.map((r,i)=>`<option value="${i}"${sel===i?' selected':''}>${esc((DAYS[(r.d!=null?r.d:0)]||'')+' '+(r.s||'')+(r.e?'–'+r.e:''))}</option>`).join('');}
function refreshFirstSlot(){const sel=document.getElementById('f-first-slot');if(!sel)return;const prev=sel.value;
  const rows=$$('#sched-rows .sched-row').map(row=>({d:Number(row.querySelector('.sched-d').value),s:row.querySelector('.sched-s').value,e:row.querySelector('.sched-e').value})).filter(r=>r.s||r.e);
  sel.innerHTML='<option value="">（第一個時段／自動）</option>'+rows.map((r,i)=>`<option value="${i}">${esc((DAYS[r.d]||'')+' '+(r.s||'')+(r.e?'–'+r.e:''))}</option>`).join('');
  if(prev!==''&&rows[Number(prev)])sel.value=prev;}
function sessionsUsed(s){
  if(!s||!Array.isArray(s.schedule)||!s.schedule.length)return 0;
  const startStr=s.first_class||s.sessions_start||s.created_at;if(!startStr)return 0;
  const start=new Date(startStr);if(isNaN(start))return 0;start.setHours(0,0,0,0);
  const now=new Date();if(now<start)return 0;
  const toMin=h=>{const p=(h||'').split(':');return (+p[0]||0)*60+(+p[1]||0);};
  const fs=(s.first_slot!=null&&s.schedule[s.first_slot])?s.schedule[s.first_slot]:null;const fsDay=fs?(fs.d!=null?fs.d:0):null,fsMin=fs?toMin(fs.s):-1;
  let count=0,guard=0;const cur=new Date(start);const day0=cur.toDateString();
  while(cur<=now&&guard++<4000){const dow=(cur.getDay()+6)%7;const first=cur.toDateString()===day0;
    s.schedule.forEach(r=>{const rd=(r.d!=null?r.d:0);if(rd!==dow)return;
      if(first&&fs&&fsDay===dow&&toMin(r.s)<fsMin)return;
      const end=new Date(cur);if(r.e){const p=r.e.split(':');end.setHours(+p[0]||23,+p[1]||59,0,0);}else end.setHours(23,59,0,0);if(end<=now)count++;});
    cur.setDate(cur.getDate()+1);}
  return count;}
function sessionsLeft(s){if(!s||s.sessions_total==null||s.sessions_total==='')return null;const tot=Number(s.sessions_total);if(isNaN(tot))return null;return tot-sessionsUsed(s);}
function sessChip(s){const left=sessionsLeft(s);if(left==null)return '';const cls=left<=0?'sess-out':(left<=1?'sess-low':'');return `<span>🎟️ 堂數：<b class="${cls}">剩 ${left}／共 ${esc(String(s.sessions_total))}</b>${left<=0?' <span class="badge badge-overdue">需續費</span>':''}</span>`;}
const AV=['#B23A48','#1F6F78','#C9A227','#5B6BB5','#2F855A','#C05621','#7B4DAA','#0E7C86'];
function avColor(s){let h=0;for(const c of (s||''))h=(h*31+c.charCodeAt(0))>>>0;return AV[h%AV.length];}
function genCodeStr(){const c='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<4;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function dueInfo(due){if(!due)return null;const t=new Date();t.setHours(0,0,0,0);const d=new Date(due);d.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  if(diff<0)return{cls:'badge-overdue',label:'已過期 · '+fmtDate(due)};
  if(diff===0)return{cls:'badge-soon',label:'今天截止'};
  if(diff<=3)return{cls:'badge-soon',label:diff+' 天後截止'};
  return{cls:'badge-pending',label:'截止 '+fmtDate(due)};}
function emptyHtml(i,t,d){return `<div class="empty"><div class="big">${i}</div><b>${t}</b><div style="margin-top:6px">${d}</div></div>`;}
const TYPE_LABELS={choice:'單選',fill:'填空',order:'重組',match:'配對',write:'手寫',speak:'口說'};

const S={students:[],lessons:[],questions:[],results:[],tab:'dashboard',q:''};
const sortLessons=(a)=>a.slice().sort((x,y)=>((x.order_index||0)-(y.order_index||0))||((x.created_at||'').localeCompare(y.created_at||'')));
const questionsOf=(lid)=>S.questions.filter(q=>q.lesson_id===lid).sort((a,b)=>(a.order_index||0)-(b.order_index||0));
const resultOf=(lid,sid)=>S.results.find(r=>r.lesson_id===lid&&r.student_id===sid);
function manualQ(q){return q.type==='write'||q.type==='speak'||(q.type==='fill'&&q.input_mode==='write');}
function scoreOf(l,r){const qs=questionsOf(l.id);const manual=r.manual||{};let md=0;qs.forEach(q=>{if(manualQ(q)&&manual[q.id]==='done')md++;});return (r.auto!=null?r.auto:(r.score||0))+md;}

async function loadAll(){
  const [a,b,c,d]=await Promise.all([DB.list('students'),DB.list('lessons'),DB.list('questions'),DB.list('results')]);
  S.students=a;S.lessons=b;S.questions=c;S.results=d;
}
function openModal(h){$('#modal-root').innerHTML=`<div class="overlay" data-overlay>${h}</div>`;}
function closeModal(){$('#modal-root').innerHTML='';}

function render(){
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===S.tab));
  $('#c-students').textContent=S.students.length;
  $('#c-lessons').textContent=S.lessons.length;
  $$('.panel').forEach(p=>p.classList.add('hide'));
  $('#panel-'+S.tab).classList.remove('hide');
  ({dashboard:renderDashboard,students:renderStudents,lessons:renderLessons,grades:renderGrades}[S.tab])();
}
function payInfo(due){if(!due)return null;const t=new Date();t.setHours(0,0,0,0);const d=new Date(due);if(isNaN(d))return null;d.setHours(0,0,0,0);const diff=Math.round((d-t)/86400000);
  if(diff<0)return{cls:'badge-overdue',label:'已逾期 '+(-diff)+' 天',sort:diff};
  if(diff===0)return{cls:'badge-soon',label:'今天到期',sort:0};
  if(diff<=7)return{cls:'badge-soon',label:diff+' 天後到期',sort:diff};
  return null;}
function studentProgress(s){const assigned=S.lessons.filter(l=>(l.assigned_ids||[]).includes(s.id)&&questionsOf(l.id).length);
  let done=0,pct=0,scored=0,sumPct=0;
  assigned.forEach(l=>{const r=resultOf(l.id,s.id);if(r){if(r.status==='done')done++;const tot=r.total||questionsOf(l.id).length;if(tot){sumPct+=Math.round(scoreOf(l,r)/tot*100);scored++;}}});
  pct=assigned.length?Math.round(done/assigned.length*100):0;
  return{total:assigned.length,done,pct,avg:scored?Math.round(sumPct/scored):null};}
function renderDashboard(){
  const body=$('#dashboard-body');
  if(!S.students.length){body.innerHTML=emptyHtml('📊','還沒有資料','先到「學生名冊」新增學生。');return;}
  // 付款提醒
  const pays=S.students.map(s=>({s,info:payInfo(s.payment_date)})).filter(x=>x.info).sort((a,b)=>a.info.sort-b.info.sort);
  const payHtml=pays.length?pays.map(({s,info})=>`<div class="dash-row">
      <span class="avatar sm" style="background:${avColor(s.name)}">${esc((s.name||'?').slice(0,2))}</span>
      <b>${esc(s.name)}</b><span class="badge ${info.cls}">${info.label}</span>
      <span class="grow"></span><span class="muted">${money(s.tuition,s.currency)} · ${fmtDate(s.payment_date)}</span>
      ${s.email?`<button class="btn btn-sm" data-act="resetPw" data-id="${s.id}" title="寄重設密碼信">✉️</button>`:''}
    </div>`).join(''):`<div class="muted" style="padding:8px 2px">目前沒有即將到期或逾期的付款 👍</div>`;
  // 進度
  const progHtml=S.students.map(s=>{const p=studentProgress(s);
    return `<div class="dash-row">
      <span class="avatar sm" style="background:${avColor(s.name)}">${esc((s.name||'?').slice(0,2))}</span>
      <b>${esc(s.name)}</b>
      <span class="grow"></span>
      <span class="muted">${p.total?`完成 ${p.done}/${p.total} 課${p.avg!=null?(' · 平均 '+p.avg+'%'):''}`:'尚未指派作業'}</span>
      <span class="progbar"><span style="width:${p.pct}%"></span></span>
    </div>`;}).join('');
  const lowSess=S.students.map(s=>({s,left:sessionsLeft(s)})).filter(x=>x.left!=null&&x.left<=1).sort((a,b)=>a.left-b.left);
  const sessHtml=lowSess.length?lowSess.map(({s,left})=>`<div class="dash-row"><span class="avatar sm" style="background:${avColor(s.name)}">${esc((s.name||'?').slice(0,2))}</span><b>${esc(s.name)}</b><span class="badge ${left<=0?'badge-overdue':'badge-soon'}">${left<=0?'已用完':'剩 '+left+' 堂'}</span><span class="grow"></span><span class="muted">共 ${esc(String(s.sessions_total))} 堂 · 已上 ${sessionsUsed(s)} 堂</span></div>`).join(''):`<div class="muted" style="padding:8px 2px">目前沒有快用完堂數的學生 👍</div>`;
  body.innerHTML=`<div class="card"><div class="lesson-label">💳 付款提醒</div>${payHtml}</div>
    <div class="card" style="margin-top:14px"><div class="lesson-label">🎟️ 堂數提醒</div>${sessHtml}</div>
    <div class="card" style="margin-top:14px"><div class="lesson-label">📈 學生進度</div>${progHtml}</div>`;
}

/* ---------- 學生名冊 ---------- */
function renderStudents(){
  const wrap=$('#students-list');let list=S.students;
  if(S.q){const q=S.q.toLowerCase();list=list.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.nationality||'').toLowerCase().includes(q));}
  if(!S.students.length){wrap.className='';wrap.innerHTML=emptyHtml('👩‍🏫','還沒有學生','點「新增學生」建立第一位。');return;}
  if(!list.length){wrap.className='';wrap.innerHTML=emptyHtml('🔍','找不到符合的學生','換個關鍵字。');return;}
  wrap.className='cards cols-2';
  wrap.innerHTML=list.map(s=>`<div class="card student-card">
    <div class="row-between"><div style="display:flex;gap:12px;align-items:center">
      <div class="avatar" style="background:${avColor(s.name)}">${esc((s.name||'?').slice(0,2))}</div>
      <div><div class="name">${esc(s.name)}</div>
        <div style="margin-top:3px;display:flex;gap:6px;flex-wrap:wrap"><span class="tag accent">${esc(s.class_type||'1對1')}</span>${s.nationality?`<span class="tag">${esc(s.nationality)}</span>`:''}</div></div></div>
      <div class="actions"><button class="btn btn-sm" data-act="editStudent" data-id="${s.id}">編輯</button>
        <button class="btn btn-sm" data-act="payments" data-id="${s.id}">💰 繳費</button>
        <button class="btn btn-sm btn-danger" data-act="delStudent" data-id="${s.id}">刪除</button></div></div>
    <div class="meta" style="margin-top:14px"><span>📖 教材：<b>${esc(s.textbook||'—')}</b></span><span>🕒 上課：<b>${esc(fmtSchedule(s))}</b></span>
      <span>💰 學費：<b>${money(s.tuition,s.currency)}</b></span><span>📅 付款日：<b>${fmtDate(s.payment_date)}</b></span><span>✉️ Email：<b>${esc(s.email||'—')}</b></span>${sessChip(s)}</div>
    ${s.email?`<div class="meta" style="margin-top:8px;align-items:center">${s.reset_requested?'<span class="badge badge-soon">🔑 學生申請重設</span>':''}<button class="btn btn-sm" data-act="resetPw" data-id="${s.id}">✉️ 寄重設密碼信</button></div>`:''}
    ${s.notes?`<div class="meta" style="margin-top:8px"><span>📝 ${esc(s.notes)}</span></div>`:''}</div>`).join('');
}
function studentModal(st){const e=!!st;st=st||{};
  openModal(`<div class="modal"><div class="modal-head"><h3>${e?'編輯學生':'新增學生'}</h3><button class="x" data-act="closeModal">×</button></div>
   <div class="modal-body"><div class="form-grid">
     <div class="field"><label>名字 *</label><input id="f-name" type="text" value="${esc(st.name||'')}"></div>
     <div class="field"><label>國籍</label><input id="f-nat" type="text" value="${esc(st.nationality||'')}" placeholder="例：美國"></div>
     <div class="field full"><label>使用教材</label><input id="f-book" type="text" value="${esc(st.textbook||'')}" placeholder="例：當代中文課程 1"></div>
     <div class="field"><label>班別</label><select id="f-type"><option ${st.class_type==='1對1'?'selected':''}>1對1</option><option ${st.class_type==='團班'?'selected':''}>團班</option></select></div>
     <div class="field full"><label>上課時段 <span class="hint">一週可多個，依學生實際安排（例：週三 20:00–22:00、週五 15:00–17:00）</span></label>
       <div id="sched-rows">${(Array.isArray(st.schedule)&&st.schedule.length?st.schedule:[{}]).map(r=>schedRowHTML(r)).join('')}</div>
       <button class="btn btn-sm" type="button" data-act="schedAdd" style="margin-top:6px">＋ 新增時段</button></div>
     <div class="field"><label>付款日期</label><input id="f-pay" type="date" value="${esc(st.payment_date||'')}"></div>
     <div class="field"><label>堂數（總共） <span class="hint">本期購買的堂數</span></label><input id="f-sess" type="number" min="0" value="${st.sessions_total??''}" placeholder="例：10"></div>
     <div class="field"><label>第一堂課 <span class="hint">第一次上課是哪天、哪個時段；之後依每週時段自動往後扣堂</span></label>
       <div style="display:flex;gap:8px;flex-wrap:wrap">
         <input id="f-first-date" type="date" style="flex:1 1 140px;min-width:130px" value="${esc(st.first_class||st.sessions_start||'')}">
         <select id="f-first-slot" style="flex:1 1 150px;min-width:140px">${firstSlotOptions(st)}</select></div></div>
     <div class="field"><label>學費</label><input id="f-fee" type="number" value="${st.tuition??''}" placeholder="例：800"></div>
     <div class="field"><label>幣別</label><select id="f-cur"><option value="TWD"${(st.currency||'TWD')==='TWD'?' selected':''}>臺幣 NT$</option><option value="VND"${st.currency==='VND'?' selected':''}>越南盾 ₫</option><option value="USD"${st.currency==='USD'?' selected':''}>美元 US$</option></select></div>
     ${e
       ? `<div class="field full"><label>Email（登入帳號）</label><input id="f-email" type="email" value="${esc(st.email||'')}" disabled style="opacity:.65"><span class="hint">建立後不可更改；要改密碼請按卡片上的「寄重設密碼信」</span></div>`
       : `<div class="field"><label>Email（登入帳號）*</label><input id="f-email" type="email" value="" placeholder="student@example.com" autocomplete="off"></div>
     <div class="field"><label>初始密碼 *</label><input id="f-pw" type="text" value="" placeholder="至少 6 碼，告訴學生"></div>
     <div class="field full"><span class="hint">系統會用這個 Email 與密碼為學生建立安全登入帳號；密碼不會存進資料庫。</span></div>`}
     <div class="field full"><label>備註</label><textarea id="f-notes" style="min-height:60px">${esc(st.notes||'')}</textarea></div>

let QE_TYPE='choice';
function qeFieldsHTML(type,q){q=q||{};const opt=q.options||[];
  if(type==='choice'){const lines=Array.isArray(opt)?opt.join('\n'):'';const correct=(typeof q.answer==='number')?(q.answer+1):'';
    return `<div class="field"><label>選項 <span class="hint">每行一個</span></label><textarea id="qe-options" placeholder="選項一&#10;選項二&#10;選項三">${esc(lines)}</textarea></div>
      <div class="field"><label>正確答案 <span class="hint">填第幾個選項（1、2、3…）</span></label><input id="qe-correct" type="number" min="1" value="${correct}"></div>`;}
  if(type==='fill'){const acc=Array.isArray(q.answer)?q.answer.join('\n'):'';const md=q.input_mode||'type';
    return `<div class="field"><label>作答方式</label><select id="qe-fillmode">
        <option value="type"${md==='type'?' selected':''}>打字輸入（自動批改）</option>
        <option value="write"${md==='write'?' selected':''}>手寫漢字（畫布；上課內容可自我對照，作業由你批改）</option></select></div>
      <div class="hint" style="margin-bottom:8px">打字模式：題目中用 <b>___</b>（三條底線）代表填空處。手寫模式：學生在格子裡寫漢字。</div>
      <div class="field"><label>答案 <span class="hint">每行一個；打字模式＝相符即算對；手寫模式＝參考答案／學生自我對照</span></label><textarea id="qe-accept" placeholder="謝謝&#10;謝謝你">${esc(acc)}</textarea></div>`;}
  if(type==='order'){const segs=Array.isArray(opt)?opt.join('\n'):'';
    return `<div class="field"><label>正確順序 <span class="hint">每行一個詞／字，依正確順序</span></label><textarea id="qe-segs" placeholder="我&#10;每天&#10;喝&#10;咖啡">${esc(segs)}</textarea>
      <div class="hint" style="margin-top:4px">學生會看到打散的詞，要排回正確順序。</div></div>`;}
  if(type==='write'){const ref=Array.isArray(q.answer)?q.answer.join(''):'';
    return `<div class="hint" style="margin-bottom:8px">學生會看到上面的「題目」並在格子裡手寫漢字（例如題目寫「請寫出：謝謝（xièxie）」）。送出後你在「成績總覽」批改。</div>
      <div class="field"><label>參考答案 <span class="hint">選填，批改時顯示給你對照，例如「謝謝」</span></label><input id="qe-ref" type="text" value="${esc(ref)}"></div>`;}
  if(type==='speak'){return `<div class="hint" style="margin-bottom:8px">學生會看到上面的「題目」，按麥克風錄一段唸給你聽；送出後你在「成績總覽」播放並批改。可在下方「聽力音檔」放一段示範發音給學生跟讀（選填）。</div>`;}
  const pairs=Array.isArray(opt)?opt.map(p=>`${p.l}=${p.r}`).join('\n'):'';
  return `<div class="field"><label>配對 <span class="hint">每行「左=右」</span></label><textarea id="qe-pairs" placeholder="你好=Hello&#10;謝謝=Thank you&#10;再見=Goodbye">${esc(pairs)}</textarea></div>`;
}

  const gpField=`<div class="field"><label>屬於哪個語法點 <span class="hint">選了之後，這題會出現在「上課內容」該語法卡下面，學生看完解釋就能練</span></label>

   <div class="modal-foot"><button class="btn btn-ghost" data-act="backToQuestions" data-id="${lid}">取消</button>
     <button class="btn btn-primary" data-act="saveQuestion" data-id="${lid}::${q.id||''}">${e?'儲存':'新增'}</button></div></div>`);

/* ---------- 成績 ---------- */
function renderGrades(){
  const wrap=$('#grades-list');const ls=sortLessons(S.lessons).filter(l=>(l.assigned_ids||[]).length);
  if(!ls.length){wrap.innerHTML=emptyHtml('📊','還沒有成績','到「課文練習」指派課文給學生，學生作答後這裡會顯示分數。');return;}
  wrap.innerHTML='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-sm" data-act="exportGrades">⬇ 匯出成績 CSV</button></div>'+ls.map(l=>{
    const targets=(l.assigned_ids||[]).map(id=>S.students.find(s=>s.id===id)).filter(Boolean);
    const qs=questionsOf(l.id);const qn=qs.length;const writeQs=qs.filter(manualQ);
    const rows=targets.map(s=>{const r=resultOf(l.id,s.id);const pend=r&&r.status==='pending';
      return `<tr><td><span class="dot ${r&&!pend?'ok':'no'}"></span>${esc(s.name)}</td>
        <td>${!r?'<span class="badge badge-pending">未開始</span>':(pend?'<span class="badge badge-soon">待批改</span>':'<span class="badge badge-ok">已完成</span>')}</td>
        <td><b>${r?(scoreOf(l,r)+'/'+(r.total||qn)):'—'}</b></td></tr>`;}).join('');
    const doneCount=targets.filter(s=>{const r=resultOf(l.id,s.id);return r&&r.status==='done';}).length;
    let hwSection='';
    if(writeQs.length){
      const reviewed=targets.map(s=>{const r=resultOf(l.id,s.id);if(!r)return '';
        const blocks=writeQs.map(q=>{const resp=(r.answers||{})[q.id];const mk=(r.manual||{})[q.id];
          const media=q.type==='speak'?(resp?`<audio class="rec-audio" controls src="${esc(resp)}"></audio>`:'<div class="hint">（未作答）</div>'):(resp?`<img class="hw-img" src="${resp}" alt="">`:'<div class="hint">（未作答）</div>');
          return `<div class="hw-review"><div class="meta"><span class="tag accent">${TYPE_LABELS[q.type]}</span> <b>${esc(q.prompt||'')}</b>${q.answer&&q.answer.length?` <span class="tag gold">參考：${esc(q.answer.join(''))}</span>`:''}</div>
            ${media}
            <div class="hw-tools" style="margin-top:8px">
              <button class="btn btn-sm ${mk==='done'?'btn-accent':''}" data-act="markWrite" data-id="${r.id}::${q.id}::done">✓ 正確</button>
              <button class="btn btn-sm ${mk==='wrong'?'btn-danger':''}" data-act="markWrite" data-id="${r.id}::${q.id}::wrong">✗ 錯誤</button>
              <span class="hint">${mk?('已標記：'+(mk==='done'?'正確':'錯誤')):'尚未批改'}</span>
            </div></div>`;}).join('');
        return `<div style="margin-top:12px"><div class="meta" style="margin-bottom:6px"><b>${esc(s.name)}</b></div>${blocks}</div>`;}).filter(Boolean).join('');
      hwSection=`<details class="disc" style="margin-top:14px"><summary>✍️🎙️ 批改手寫／口說（${writeQs.length} 題）</summary>${reviewed||'<div class="hint" style="margin-top:8px">還沒有人作答手寫／口說題。</div>'}</details>`;
    }
    return `<div class="card"><div class="row-between"><div>
      <h3 style="font-size:17px">${l.order_index?('第'+l.order_index+'課 · '):''}${esc(l.title)}</h3>
      <div class="meta" style="margin-top:5px"><span>${qn} 題</span><span>完成 <b>${doneCount}/${targets.length}</b></span></div></div></div>
      <div style="overflow:auto;margin-top:12px"><table class="matrix"><thead><tr><th>學生</th><th>狀態</th><th>分數</th></tr></thead><tbody>${rows}</tbody></table></div>
      ${hwSection}</div>`;}).join('');
}

/* ---------- 動作 ---------- */
function writeErr(prefix,err){const m=((err&&(err.code||err.message))||'')+'';return prefix+'：'+(/permission|insufficient|unauth/i.test(m)?'登入可能過期了，請按右上角「登出」再重新登入後再試':(m||'發生錯誤'));}
const H={};
H.tab=(id)=>{S.tab=id;render();};
H.logout=()=>{try{if(window.firebase&&firebase.auth&&firebase.apps&&firebase.apps.length)firebase.auth().signOut();}catch(e){}sessionStorage.removeItem('teacher_ok');location.reload();};
H.closeModal=closeModal;
H.genCode=()=>{$('#f-code').value=genCodeStr();};

H.addStudent=()=>studentModal(null);
H.editStudent=(id)=>studentModal(S.students.find(s=>s.id===id));
H.schedAdd=()=>{const c=$('#sched-rows');if(c)c.insertAdjacentHTML('beforeend',schedRowHTML({}));refreshFirstSlot();};
H.schedDel=(_,b)=>{const row=b.closest('.sched-row');if(!row)return;const c=row.parentElement;row.remove();if(c&&!c.querySelector('.sched-row'))c.insertAdjacentHTML('beforeend',schedRowHTML({}));refreshFirstSlot();};
H.delStudent=async(id)=>{const s=S.students.find(x=>x.id===id);if(!confirm(`確定刪除「${s.name}」？相關成績也會一併刪除。`))return;try{await DB.remove('students',id);await loadAll();render();toast('已刪除');}catch(err){toast(writeErr('刪除失敗',err));}};
function authMsg(err){const c=((err&&err.code)||'')+'';if(c.indexOf('email-already-in-use')>=0)return '這個 Email 已經建立過帳號了';if(c.indexOf('invalid-email')>=0)return 'Email 格式不正確';if(c.indexOf('weak-password')>=0)return '密碼太弱，至少 6 碼';return (err&&err.message)||'發生錯誤';}
async function createStudentAuth(email,password){
  const sec=firebase.apps.find(a=>a.name==='secondary')||firebase.initializeApp(window.FIREBASE_CONFIG,'secondary');
  const cred=await sec.auth().createUserWithEmailAndPassword(email,password);const u=cred.user.uid;await sec.auth().signOut();return u;}
H.saveStudent=async(id)=>{const name=$('#f-name').value.trim();if(!name)return toast('請輸入名字');
  try{await ensureAuthFresh();}catch(err){return toast(err.message);}
  const schedule=$$('#sched-rows .sched-row').map(row=>({d:Number(row.querySelector('.sched-d').value),s:row.querySelector('.sched-s').value,e:row.querySelector('.sched-e').value})).filter(r=>r.s||r.e);
  const fslot=$('#f-first-slot');
  const common={name,nationality:$('#f-nat').value.trim(),textbook:$('#f-book').value.trim(),class_type:$('#f-type').value,schedule,class_time:schedule.length?fmtSchedule({schedule}):null,
    payment_date:$('#f-pay').value||null,tuition:$('#f-fee').value===''?null:Number($('#f-fee').value),currency:$('#f-cur').value,
    sessions_total:$('#f-sess').value===''?null:Number($('#f-sess').value),first_class:$('#f-first-date').value||null,first_slot:(fslot&&fslot.value!=='')?Number(fslot.value):null,sessions_start:null,notes:$('#f-notes').value.trim()};
  if(id){try{await DB.update('students',id,common);closeModal();await loadAll();render();toast('已儲存');}catch(err){const m=((err&&(err.code||err.message))||'')+'';toast(/permission|insufficient|unauth/i.test(m)?'儲存失敗：登入已失效，請按右上角「登出」再重新登入後再試':('儲存失敗：'+m));}return;}
  const email=($('#f-email').value||'').trim().toLowerCase(),pw=$('#f-pw').value;
  if(!email||!pw)return toast('請填 Email 與初始密碼');if(pw.length<6)return toast('初始密碼至少 6 碼');
  if(S.students.some(s=>(s.email||'').toLowerCase()===email))return toast('這個 Email 已被其他學生使用');
  const btn=document.querySelector('[data-act="saveStudent"]');if(btn){btn.disabled=true;btn.textContent='建立中…';}

H.payments=(id)=>{const s=S.students.find(x=>x.id===id);if(!s)return;const ps=(s.payments||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const total=ps.reduce((sum,p)=>sum+(Number(p.amount)||0),0);
  const rows=ps.length?ps.map((p,i)=>`<div class="dash-row"><span class="grow"><b>${esc(p.date||'')}</b> · ${money(p.amount,p.currency||s.currency)}${p.sessions?(' · +'+p.sessions+' 堂'):''}${p.note?(' · '+esc(p.note)):''}</span><button class="btn btn-sm btn-danger" type="button" data-act="payDel" data-id="${id}::${i}">✕</button></div>`).join(''):'<div class="hint" style="padding:8px 0">還沒有繳費紀錄。</div>';
  openModal(`<div class="modal"><div class="modal-head"><h3>${esc(s.name)} · 繳費紀錄</h3><button class="x" data-act="closeModal">×</button></div>
   <div class="modal-body">
     <div style="margin-bottom:6px">${rows}</div>
     ${ps.length?`<div class="meta" style="margin:6px 0 14px"><span>累計：<b>${money(total,s.currency)}</b>（${ps.length} 筆）</span>${sessChip(s)}</div>`:''}
     <div class="form-grid">
       <div class="field"><label>日期</label><input id="pay-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
       <div class="field"><label>金額</label><input id="pay-amount" type="number" min="0" placeholder="例：800"></div>
       <div class="field"><label>幣別</label><select id="pay-cur"><option value="TWD"${(s.currency||'TWD')==='TWD'?' selected':''}>臺幣 NT$</option><option value="VND"${s.currency==='VND'?' selected':''}>越南盾 ₫</option><option value="USD"${s.currency==='USD'?' selected':''}>美元 US$</option></select></div>
       <div class="field"><label>加堂數 <span class="hint">選填，會加進總堂數</span></label><input id="pay-sess" type="number" min="0" placeholder="例：10"></div>
       <div class="field full"><label>備註</label><input id="pay-note" type="text" placeholder="選填，例：6月學費"></div>
     </div></div>
   <div class="modal-foot"><button class="btn btn-ghost" data-act="closeModal">關閉</button><button class="btn btn-primary" data-act="payAdd" data-id="${id}">＋ 新增這筆</button></div></div>`);};
H.payAdd=async(id)=>{const s=S.students.find(x=>x.id===id);if(!s)return;const date=$('#pay-date').value;if(!date)return toast('請選日期');
  const amt=$('#pay-amount').value,sess=$('#pay-sess').value;
  const entry={date,amount:amt===''?null:Number(amt),currency:$('#pay-cur').value,sessions:sess===''?null:Number(sess),note:$('#pay-note').value.trim()};
  const payments=(s.payments||[]).concat([entry]);const patch={payments};if(entry.sessions){patch.sessions_total=(Number(s.sessions_total)||0)+entry.sessions;}
  try{await DB.update('students',id,patch);await loadAll();H.payments(id);render();toast('已新增繳費');}catch(err){toast(writeErr('儲存失敗',err));}};
H.payDel=async(key)=>{const p=String(key).split('::'),id=p[0],i=Number(p[1]);const s=S.students.find(x=>x.id===id);if(!s)return;if(!confirm('刪除這筆繳費紀錄？'))return;
  const payments=(s.payments||[]).slice();const removed=payments.splice(i,1)[0];const patch={payments};if(removed&&removed.sessions){patch.sessions_total=Math.max(0,(Number(s.sessions_total)||0)-removed.sessions);}
  try{await DB.update('students',id,patch);await loadAll();H.payments(id);render();toast('已刪除');}catch(err){toast(writeErr('刪除失敗',err));}};
H.pickAudio=(id)=>{const f=document.getElementById('file-'+id);if(f)f.click();};
/* ===== 生字音檔自動切割 ===== */
function vaReset(){}
function vaWords(i){const t=document.querySelector('.dlg-vocab-in[data-i="'+i+'"]');const txt=t?t.value:((DLG[i]&&DLG[i].vocabulary)||'');return txt.split('\n').map(s=>s.replace(/[\[【][^\]】]*[\]】]/,'').split('=')[0].trim()).filter(Boolean);}
function _loudness(buf){const d=buf.getChannelData(0),sr=buf.sampleRate,win=Math.max(1,Math.floor(sr*0.02)),loud=[];for(let i=0;i<d.length;i+=win){let s=0,n=0;for(let j=i;j<i+win&&j<d.length;j++){s+=d[j]*d[j];n++;}loud.push(Math.sqrt(s/(n||1)));}return {loud,winSec:win/sr,dur:buf.duration};}
function _gate(L,thr,minSil,minDur,startSec){const loud=L.loud,w=L.winSec,segs=[];let start=-1,sil=0;const k0=Math.max(0,Math.floor((startSec||0)/w));for(let k=k0;k<loud.length;k++){if(loud[k]>thr){if(start<0)start=k*w;sil=0;}else{if(start>=0){sil+=w;if(sil>=minSil){const end=k*w-sil+w;if(end-start>=minDur)segs.push({s:+start.toFixed(2),e:+end.toFixed(2)});start=-1;sil=0;}}}}if(start>=0){const end=loud.length*w;if(end-start>=minDur)segs.push({s:+start.toFixed(2),e:+end.toFixed(2)});}return segs;}
function _thr(L){const s=L.loud.slice().sort((a,b)=>a-b);const noise=s[Math.floor(s.length*0.15)]||0,peak=s[Math.floor(s.length*0.95)]||0.1;return Math.max(noise*3,(noise+peak)*0.18,0.006);}
function vaAutoStart(L,wc){const thr=_thr(L);let ms=0.18,segs=_gate(L,thr,ms,0.12,0);
  if(segs.length<wc){for(const m of [0.14,0.11,0.09,0.07]){const sg=_gate(L,thr,m,0.12,0);if(sg.length>segs.length){segs=sg;ms=m;}if(segs.length>=wc)break;}}
  if(segs.length<=wc)return {start:0,ms};
  const startSeg=segs[segs.length-wc];return {start:+(Math.max(0,startSeg.s-0.05)).toFixed(2),ms};}
H.pickVocabAudio=(i)=>{const f=document.getElementById('file-va-'+i);if(f){f.dataset.di=i;f.click();}};
async function vaHandleFile(file,i){const d=DLG[i];if(!d)return;const st=document.getElementById('va-status-'+i);if(st)st.textContent='分析中…';
  if(d._va&&d._va.url){try{URL.revokeObjectURL(d._va.url);}catch(_){}}
  let loud;try{const ab=await file.arrayBuffer();const ctx=new (window.AudioContext||window.webkitAudioContext)();const buf=await ctx.decodeAudioData(ab);ctx.close&&ctx.close();loud=_loudness(buf);}
  catch(e){if(st)st.textContent='無法讀取音檔：'+(e.message||e);return;}
  const words=vaWords(i);if(!words.length){if(st)st.textContent='請先在這段「生詞」欄輸入生詞（每行一個），再上傳音檔。';return;}
  const a=vaAutoStart(loud,words.length);
  d._va={file,url:URL.createObjectURL(file),loud,start:a.start,ms:a.ms,segs:_gate(loud,_thr(loud),a.ms,0.12,a.start)};
  const c=document.getElementById('va-controls-'+i);if(c)c.classList.remove('hide');
  const tr=document.getElementById('va-trim-'+i);if(tr){tr.max=Math.ceil(loud.dur);tr.value=a.start;}const tv=document.getElementById('va-trim-val-'+i);if(tv)tv.textContent=a.start.toFixed(1);
  const sl=document.getElementById('va-sens-'+i);if(sl)sl.value=Math.round(a.ms*100);
  vaRenderPreview(i);}
function vaRenderPreview(i){const d=DLG[i];if(!d||!d._va)return;const words=vaWords(i);let segs=d._va.segs||[];
  if(segs.length!==words.length){const a=[];let cur=segs.length?0:0;for(let k=0;k<words.length;k++){if(segs[k]){a.push({s:+segs[k].s,e:+segs[k].e});cur=segs[k].e;}else{a.push({s:+cur.toFixed(2),e:+(cur+0.6).toFixed(2)});cur+=1.2;}}d._va.segs=a;segs=a;}
  const st=document.getElementById('va-status-'+i);if(st)st.textContent='共 '+words.length+' 個生詞。可直接改每個字的「開始～結束」秒數，點 ▶ 試聽確認；數字不準就微調即可。';
  const pv=document.getElementById('va-preview-'+i);if(pv)pv.innerHTML='<div class="va-list">'+words.map((w,k)=>{const sg=segs[k]||{s:0,e:0.6};return `<div class="va-row"><span class="va-w">${esc(w)}</span><input class="va-time" type="number" step="0.05" min="0" data-di="${i}" data-k="${k}" data-edge="s" value="${(+sg.s).toFixed(2)}"><span class="va-dash">–</span><input class="va-time" type="number" step="0.05" min="0" data-di="${i}" data-k="${k}" data-edge="e" value="${(+sg.e).toFixed(2)}"><span class="hint">秒</span><button class="btn btn-sm" type="button" data-act="vaPlay" data-id="${i}::${k}">▶ 試聽</button></div>`;}).join('')+'</div>';}
H.vaRedetect=(i)=>{const d=DLG[i];if(!d||!d._va||!d._va.loud)return;const ms=Number((document.getElementById('va-sens-'+i)||{value:20}).value)/100;const start=Number((document.getElementById('va-trim-'+i)||{value:0}).value)||0;d._va.ms=ms;d._va.start=start;const tv=document.getElementById('va-trim-val-'+i);if(tv)tv.textContent=start.toFixed(1);d._va.segs=_gate(d._va.loud,_thr(d._va.loud),ms,0.12,start);vaRenderPreview(i);};
H.vaPlay=(key)=>{const p=String(key).split('::');const i=+p[0],k=+p[1];const d=DLG[i];if(!d||!d._va)return;const seg=(d._va.segs||[])[k];if(!seg||!d._va.url)return;const a=window._vaAudio||(window._vaAudio=new Audio());a.ontimeupdate=null;a.src=d._va.url;const go=()=>{try{a.currentTime=seg.s;}catch(_){}a.ontimeupdate=()=>{if(a.currentTime>=seg.e){a.pause();a.ontimeupdate=null;}};a.play().catch(()=>{});};if(a.readyState>=1)go();else a.onloadedmetadata=go;};
async function ensureAuthFresh(){const u=window.firebase&&firebase.auth&&firebase.auth().currentUser;if(!u)throw new Error('登入已失效，請重新整理頁面（Ctrl+Shift+R）並重新登入後再試');try{await u.getIdToken(true);}catch(e){throw new Error('登入已失效，請重新整理並重新登入後再試');}}
async function uploadVocabAudio(file){await ensureAuthFresh();const ext=((file.name.split('.').pop())||'mp3').replace(/[^a-z0-9]/gi,'')||'mp3';const ref=firebase.storage().ref('vocab_audio/'+Date.now()+'_'+Math.random().toString(16).slice(2)+'.'+ext);await ref.put(file);return await ref.getDownloadURL();}
document.addEventListener('change',(e)=>{const m=((e.target&&e.target.id)||'').match(/^file-va-(\d+)$/);if(m){const f=e.target.files&&e.target.files[0];if(f)vaHandleFile(f,+m[1]);}});
document.addEventListener('input',(e)=>{const m=((e.target&&e.target.id)||'').match(/^va-(?:sens|trim)-(\d+)$/);if(m){H.vaRedetect(+m[1]);return;}
  const t=e.target;if(t&&t.classList&&t.classList.contains('va-time')){const di=+t.dataset.di,k=+t.dataset.k,edge=t.dataset.edge,v=parseFloat(t.value);const d=DLG[di];if(d&&d._va&&d._va.segs&&d._va.segs[k]&&!isNaN(v))d._va.segs[k][edge]=v;}});
document.addEventListener('change',(e)=>{if(e.target&&e.target.classList&&(e.target.classList.contains('sched-d')||e.target.classList.contains('sched-s')||e.target.classList.contains('sched-e')))refreshFirstSlot();});

document.addEventListener('click',(e)=>{
  if(e.target.matches('[data-overlay]')){closeModal();return;}
  const qt=e.target.closest('[data-qetype]');
  if(qt){QE_TYPE=qt.dataset.qetype;$$('#qe-typeseg button').forEach(b=>b.classList.toggle('on',b.dataset.qetype===QE_TYPE));$('#qe-fields').innerHTML=qeFieldsHTML(QE_TYPE,{});return;}
  const b=e.target.closest('[data-act]');if(!b)return;
  const fn=H[b.dataset.act];if(fn){e.preventDefault();fn(b.dataset.id,b);}
});
document.addEventListener('change',async(e)=>{
  const inp=e.target;if(!inp||!inp.classList||!inp.classList.contains('audio-file'))return;
  const file=inp.files&&inp.files[0];if(!file)return;
  const target=document.getElementById(inp.dataset.target),status=document.getElementById(inp.dataset.status);
  const setS=v=>{if(status)status.textContent=v;};
  if(!(window.firebase&&firebase.storage)){setS('未連 Firebase Storage，無法上傳；可改貼網址。');return;}
  if(file.size>25*1024*1024){setS('檔案太大（上限 25MB），請壓縮或改貼網址。');return;}
  try{await ensureAuthFresh();}catch(err){setS(err.message);return;}
  try{setS('上傳中… 0%');
    const safe=file.name.replace(/[^\w.\-]/g,'_');
    const ref=firebase.storage().ref('audio/'+Date.now()+'_'+safe);
    const task=ref.put(file);
    task.on('state_changed',snap=>{const p=Math.round(snap.bytesTransferred/snap.totalBytes*100);setS('上傳中… '+p+'%');});
    await task;
    const url=await ref.getDownloadURL();
    if(target)target.value=url;
    setS('✓ 上傳完成');
  }catch(err){setS('上傳失敗：'+((err&&err.message)||err));}
});

const useAuth=!!(window.firebase&&firebase.auth&&window.FIREBASE_CONFIG&&window.FIREBASE_CONFIG.apiKey);
const TEACHER_EMAIL=(window.TEACHER_EMAIL||'').toLowerCase();
function authErr(e){const c=(e&&e.code)||'';
  if(c.indexOf('wrong-password')>=0||c.indexOf('invalid-credential')>=0)return '密碼不正確';
  if(c.indexOf('user-not-found')>=0)return '查無此帳號';
  if(c.indexOf('invalid-email')>=0)return 'Email 格式不正確';
  if(c.indexOf('too-many-requests')>=0)return '嘗試太多次，請稍後再試';
  return (e&&e.message)||'登入失敗';}
function boot(){$('#app-name').textContent=window.APP_NAME||'華語線上作業簿';$('#gate-sub').textContent=window.APP_NAME||'華語線上作業簿';
  const tag=$('#mode-tag');if(DB.mode!=='local'){tag.textContent='● 雲端同步';tag.classList.remove('demo');}else{tag.textContent='● 示範模式（本機）';tag.classList.add('demo');}
  if(useAuth){$('#f-email-wrap').classList.remove('hide');$('#gate-forgot').classList.remove('hide');if(window.TEACHER_EMAIL)$('#gate-email').value=window.TEACHER_EMAIL;}}
async function enter(){$('#gate').classList.add('hide');$('#app').classList.remove('hide');try{await loadAll();render();}catch(e){toast('讀取失敗：'+e.message);}}
async function tryLogin(){
  if(useAuth){const email=$('#gate-email').value.trim(),pw=$('#gate-pw').value;
    if(!email||!pw){$('#gate-err').textContent='請輸入 Email 與密碼';return;}
    $('#gate-err').textContent='登入中…';
    try{const cred=await firebase.auth().signInWithEmailAndPassword(email,pw);
      if((cred.user.email||'').toLowerCase()!==TEACHER_EMAIL){await firebase.auth().signOut();$('#gate-err').textContent='此帳號沒有教師權限';return;}
      $('#gate-err').textContent='';
    }catch(e){$('#gate-err').textContent=authErr(e);}
  }else{const pw=$('#gate-pw').value;if(pw&&pw===(window.TEACHER_PASSWORD||'')){sessionStorage.setItem('teacher_ok','1');enter();}else{$('#gate-err').textContent='密碼不正確';}}
}
async function forgot(){const email=$('#gate-email').value.trim()||window.TEACHER_EMAIL||'';
  if(!email){$('#gate-err').textContent='請先輸入 Email';return;}
  try{await firebase.auth().sendPasswordResetEmail(email);toast('已寄出重設密碼信，請到信箱收信（含垃圾信匣）');$('#gate-err').textContent='';}
  catch(e){$('#gate-err').textContent=authErr(e);}}
$('#gate-btn').addEventListener('click',tryLogin);
$('#gate-forgot').addEventListener('click',forgot);
$('#gate-pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
$('#stu-search').addEventListener('input',e=>{S.q=e.target.value.trim();renderStudents();});
boot();
if(useAuth){firebase.auth().onAuthStateChanged(function(user){if(user&&(user.email||'').toLowerCase()===TEACHER_EMAIL){if($('#app').classList.contains('hide'))enter();}});}
else{if(sessionStorage.getItem('teacher_ok')==='1')enter();}
</script>
