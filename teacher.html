<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F6F78">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<title>教師管理 · 華語線上作業簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-pattern">

  <div id="gate" class="login-wrap">
    <div class="login-card">
      <div class="brand-badge">師</div>
      <h1>教師管理後台</h1>
      <p class="sub" id="gate-sub">華語線上作業簿</p>
      <div class="field hide" id="f-email-wrap"><label>教師 Email</label><input id="gate-email" type="email" placeholder="you@example.com" autocomplete="username"></div>
      <div class="field"><label>密碼</label><input id="gate-pw" type="password" placeholder="請輸入密碼" autocomplete="current-password"></div>
      <div class="err" id="gate-err"></div>
      <button class="btn btn-primary" style="width:100%" id="gate-btn">登入</button>
      <button class="btn btn-ghost hide" style="width:100%;margin-top:8px;font-size:13px" id="gate-forgot">忘記密碼？寄送重設信</button>
      <p class="sub" style="margin:18px 0 0;font-size:12px">學生請改用「學生頁面」(student.html)</p>
    </div>
  </div>

  <div id="app" class="hide">
    <div class="topbar"><div class="topbar-inner">
      <div class="brand"><div class="brand-badge">師</div>
        <div><div class="brand-title" id="app-name">華語線上作業簿</div><div class="brand-sub">教師管理後台</div></div></div>
      <div class="topbar-spacer"></div>
      <span class="mode-tag" id="mode-tag"></span>
      <button class="btn btn-sm btn-ghost" data-act="exportAll" title="把所有資料匯出成 Excel 備份">⬇ 備份</button>
      <button class="btn btn-sm btn-ghost" data-act="trash" title="垃圾桶（7 天內可復原）">🗑</button>
      <button class="btn btn-sm btn-ghost hide" id="admin-btn" data-act="admins">👤 管理員</button>
      <button class="btn btn-sm btn-ghost" data-act="logout">登出</button>
    </div></div>

    <div class="container">
      <div class="tabs">
        <button class="tab" data-act="tab" data-id="dashboard">📋 待辦</button>
        <button class="tab" data-act="tab" data-id="students">學生名冊 <span class="count" id="c-students">0</span></button>
        <button class="tab" data-act="tab" data-id="calendar">📅 課表</button>
        <button class="tab" data-act="tab" data-id="lessons">課文練習 <span class="count" id="c-lessons">0</span></button>
        <button class="tab" data-act="tab" data-id="grades">成績總覽 <span class="count alert hide" id="c-pending">0</span></button>
        <button class="tab" data-act="tab" data-id="ops">📊 營運</button>
      </div>

      <section id="panel-dashboard" class="panel">
        <div class="section-head"><h2>📋 待辦</h2><span class="sub">需要你處理的事項</span></div>
        <div id="dashboard-body"></div>
      </section>

      <section id="panel-calendar" class="panel hide">
        <div class="section-head"><h2>📅 本週課表</h2><span class="sub">每位學生的上課時段、Meet 教室與加入日曆</span></div>
        <div id="calendar-body"></div>
      </section>

      <section id="panel-students" class="panel hide">
        <div class="section-head"><h2>學生名冊</h2><span class="sub">基本資料與學費</span><span class="grow"></span>
          <input id="stu-search" type="text" placeholder="搜尋名字 / 國籍…" style="max-width:190px">
          <button class="btn btn-primary owner-only" data-act="addStudent">＋ 新增學生</button></div>
        <div id="students-list" class="cards cols-2"></div>
      </section>

      <section id="panel-lessons" class="panel hide">
        <div class="section-head"><h2>課文與練習</h2><span class="sub">上傳課文、音檔、出練習題；也可只出作業（課文留空）</span><span class="grow"></span>
          <button class="btn btn-primary" data-act="addLesson">＋ 新增課文／作業</button></div>
        <div id="lessons-list" class="cards"></div>
      </section>

      <section id="panel-grades" class="panel hide">
        <div class="section-head"><h2>成績總覽</h2><span class="sub">每位學生每課的完成與分數</span></div>
        <div id="grades-list" class="cards"></div>
      </section>

      <section id="panel-ops" class="panel hide">
        <div class="section-head"><h2>📊 營運</h2><span class="sub">收入、待收款、管理員、公告</span></div>
        <div id="ops-body"></div>
      </section>

      <div class="foot-note">華語線上作業簿 · 教師後台</div>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script>
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const esc=(s)=>(s==null?"":String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function fmtDate(d){if(!d)return'—';const x=new Date(d);if(isNaN(x))return d;return x.getFullYear()+'/'+String(x.getMonth()+1).padStart(2,'0')+'/'+String(x.getDate()).padStart(2,'0');}
const CUR={TWD:['NT$','zh-TW'],VND:['₫','vi-VN'],USD:['US$','en-US']};
function money(n,cur){if(n==null||n==='')return'—';const v=Number(n);if(isNaN(v))return n;const c=CUR[cur||'TWD']||CUR.TWD;return c[0]+v.toLocaleString(c[1]);}
const DAYS=['週一','週二','週三','週四','週五','週六','週日'];
function fmtSchedule(s){if(s&&Array.isArray(s.schedule)&&s.schedule.length){return s.schedule.map(r=>(DAYS[(r.d!=null?r.d:0)]||'')+' '+(r.s||'')+(r.e?'–'+r.e:'')).join('、');}return (s&&s.class_time)||'—';}
function timeOpts(sel){sel=sel||'';let html='<option value="">--:--</option>';let has=false;for(let h=0;h<24;h++){for(let m=0;m<60;m+=15){const v=(h<10?'0'+h:h)+':'+(m<10?'0'+m:m);if(v===sel)has=true;html+='<option value="'+v+'"'+(v===sel?' selected':'')+'>'+v+'</option>';}}if(sel&&!has)html='<option value="'+esc(sel)+'" selected>'+esc(sel)+'</option>'+html;return html;}
function schedRowHTML(r){r=r||{};return `<div class="sched-row">
  <select class="sched-d">${DAYS.map((d,i)=>`<option value="${i}"${r.d===i?' selected':''}>${d}</option>`).join('')}</select>
  <select class="sched-s">${timeOpts(r.s||'')}</select><span class="sched-dash">–</span><select class="sched-e">${timeOpts(r.e||'')}</select>
  <button class="btn btn-sm btn-ghost sched-x" type="button" data-act="schedDel" aria-label="刪除時段">✕</button></div>`;}
function firstSlotOptions(st){const sch=(Array.isArray(st&&st.schedule)?st.schedule:[]).filter(r=>r&&(r.s||r.e));const sel=st&&st.first_slot;
  return '<option value="">（第一個時段／自動）</option>'+sch.map((r,i)=>`<option value="${i}"${sel===i?' selected':''}>${esc((DAYS[(r.d!=null?r.d:0)]||'')+' '+(r.s||'')+(r.e?'–'+r.e:''))}</option>`).join('');}
// 由日期字串(YYYY-MM-DD)算出星期，對應 DAYS：週一=0…週日=6
function dowOf(dateStr){if(!dateStr)return null;const d=new Date(dateStr+'T00:00:00');if(isNaN(d))return null;return (d.getDay()+6)%7;}
// 第一堂課時段：依「第一堂課日期」是星期幾，只列出那一天的時段，不預設
function refreshFirstSlot(desired){const sel=document.getElementById('f-first-slot');if(!sel)return;
  const want=(desired!=null)?String(desired):sel.value;
  const dateEl=document.getElementById('f-first-date');const dow=dowOf(dateEl?dateEl.value:'');
  const rows=$$('#sched-rows .sched-row').map(row=>({d:Number(row.querySelector('.sched-d').value),s:row.querySelector('.sched-s').value,e:row.querySelector('.sched-e').value})).filter(r=>r.s||r.e);
  if(dow==null){sel.innerHTML='<option value="">（請先選左邊的日期）</option>';sel.value='';return;}
  const matches=[];rows.forEach((r,i)=>{if(r.d===dow)matches.push({r,i});});
  if(!matches.length){sel.innerHTML='<option value="">'+esc(DAYS[dow])+'還沒有上課時段，請先到上面新增</option>';sel.value='';return;}
  sel.innerHTML=(matches.length>1?'<option value="">請選擇</option>':'')+matches.map(o=>`<option value="${o.i}">${esc((DAYS[o.r.d]||'')+' '+(o.r.s||'')+(o.r.e?'–'+o.r.e:''))}</option>`).join('');
  if(matches.length===1)sel.value=String(matches[0].i);
  else if(want!==''&&matches.some(o=>String(o.i)===want))sel.value=want;else sel.value='';}
function sessionsUsed(s){
  if(!s||!Array.isArray(s.schedule)||!s.schedule.length)return 0;
  const startStr=s.first_class||s.sessions_start||s.created_at;if(!startStr)return 0;
  const start=new Date(startStr);if(isNaN(start))return 0;start.setHours(0,0,0,0);
  const now=new Date();if(now<start)return 0;
  const toMin=h=>{const p=(h||'').split(':');return (+p[0]||0)*60+(+p[1]||0);};
  const fs=(s.first_slot!=null&&s.schedule[s.first_slot])?s.schedule[s.first_slot]:null;const fsDay=fs?(fs.d!=null?fs.d:0):null,fsMin=fs?toMin(fs.s):-1;
  let count=0,guard=0;const cur=new Date(start);const day0=cur.toDateString();
  while(cur<=now&&guard++<4000){const dow=(cur.getDay()+6)%7;const first=cur.toDateString()===day0;
    s.schedule.forEach(r=>{const rd=(r.d!=null?r.d:0);if(rd!==dow)return;
      if(first&&fs&&fsDay===dow&&toMin(r.s)<fsMin)return;
      const end=new Date(cur);if(r.e){const p=r.e.split(':');end.setHours(+p[0]||23,+p[1]||59,0,0);}else end.setHours(23,59,0,0);if(end<=now)count++;});
    cur.setDate(cur.getDate()+1);}
  return count;}
function classAttended(s){return Array.isArray(s&&s.class_log)?s.class_log.filter(e=>e&&e.status!=='leave').length:null;}
function sessionsLeft(s){if(!s||s.sessions_total==null||s.sessions_total==='')return null;const tot=Number(s.sessions_total);if(isNaN(tot))return null;const att=classAttended(s);return tot-(att!=null?att:sessionsUsed(s));}
function sessChip(s){const left=sessionsLeft(s);if(left==null)return '';const cls=left<=0?'sess-out':(left<=1?'sess-low':'');return `<span>🎟️ 堂數：<b class="${cls}">剩 ${left}／共 ${esc(String(s.sessions_total))}</b>${left<=0?' <span class="badge badge-overdue">需續費</span>':''}</span>`;}
const AV=['#B23A48','#1F6F78','#C9A227','#5B6BB5','#2F855A','#C05621','#7B4DAA','#0E7C86'];
function avColor(s){let h=0;for(const c of (s||''))h=(h*31+c.charCodeAt(0))>>>0;return AV[h%AV.length];}
function genCodeStr(){const c='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<4;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function dueInfo(due){if(!due)return null;const t=new Date();t.setHours(0,0,0,0);const d=new Date(due);d.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  if(diff<0)return{cls:'badge-overdue',label:'已過期 · '+fmtDate(due)};
  if(diff===0)return{cls:'badge-soon',label:'今天截止'};
  if(diff<=3)return{cls:'badge-soon',label:diff+' 天後截止'};
  return{cls:'badge-pending',label:'截止 '+fmtDate(due)};}
function emptyHtml(i,t,d){return `<div class="empty"><div class="big">${i}</div><b>${t}</b><div style="margin-top:6px">${d}</div></div>`;}
const TYPE_LABELS={choice:'單選',fill:'填空',opt:'選填',qa:'問答',order:'重組',match:'配對',write:'手寫',speak:'口說',note:'示範'};

const S={students:[],lessons:[],questions:[],results:[],sentences:[],quizzes:[],quizResults:[],discussions:[],admins:[],announcements:[],trashStudents:[],trashLessons:[],tab:'dashboard',q:'',openCards:new Set()};
let IS_OWNER=false, MY_EMAIL='';
function adminName(email){if(!email)return '主管理員';const a=(S.admins||[]).find(x=>(x.email||'').toLowerCase()===(email||'').toLowerCase());return (a&&(a.name||a.email))||email;}
const sortLessons=(a)=>a.slice().sort((x,y)=>((x.order_index||0)-(y.order_index||0))||((x.created_at||'').localeCompare(y.created_at||'')));
const questionsOf=(lid)=>S.questions.filter(q=>q.lesson_id===lid).sort((a,b)=>(a.order_index||0)-(b.order_index||0));
const answerableOf=(lid)=>questionsOf(lid).filter(q=>q.type!=='note'); // 排除示範題（不計分）
// 邏輯排序：先依語法點，再依小節(A→B→…，無小節排最後)，最後依原順序
function qSecKey(q){return ((q.gp_index==null)?'none':q.gp_index)+'|'+((q.gp_sub||'').trim());}
function sortQuestionsLogical(qs){return qs.slice().sort((a,b)=>{
  const ga=(a.gp_index==null)?999:a.gp_index, gb=(b.gp_index==null)?999:b.gp_index;
  if(ga!==gb)return ga-gb;
  const sa=(a.gp_sub||'').trim()||'￿', sb=(b.gp_sub||'').trim()||'￿';
  if(sa!==sb)return sa<sb?-1:1;
  return (a.order_index||0)-(b.order_index||0);});}
const resultOf=(lid,sid)=>S.results.find(r=>r.lesson_id===lid&&r.student_id===sid);
function manualQ(q){return q.type==='write'||q.type==='speak'||q.type==='qa'||q.type==='opt'||(q.type==='fill'&&q.input_mode==='write');}
function scoreOf(l,r){const qs=questionsOf(l.id);const manual=r.manual||{};let md=0;qs.forEach(q=>{if(manualQ(q)&&manual[q.id]==='done')md++;});return (r.auto!=null?r.auto:(r.score||0))+md;}

function myEmailNow(){try{return (firebase.auth().currentUser.email||'').toLowerCase();}catch(e){return '';}}
async function loadAll(){
  IS_OWNER=isOwner();MY_EMAIL=myEmailNow();const owner=IS_OWNER;
  const [a,b,c,d]=await Promise.all([
    owner?DB.list('students'):DB.listWhere('students','admin',MY_EMAIL),
    DB.list('lessons'),DB.list('questions'),DB.list('results')]);
  S.students=a.filter(x=>!x.deleted_at);S.trashStudents=a.filter(x=>!!x.deleted_at);S.questions=c;
  S.lessons=b.filter(x=>x.kind!=='quiz'&&x.kind!=='announcement'&&!x.deleted_at);S.quizzes=b.filter(x=>x.kind==='quiz'&&!x.deleted_at);S.announcements=b.filter(x=>x.kind==='announcement'&&!x.deleted_at);S.trashLessons=b.filter(x=>!!x.deleted_at&&x.kind!=='quiz'&&x.kind!=='announcement');
  splitResults(d);
  {const cut=Date.now()-7*864e5;(S.trashStudents||[]).forEach(x=>{const t=Date.parse(x.deleted_at||'');if(t&&t<cut)DB.remove('students',x.id).catch(()=>{});});(S.trashLessons||[]).forEach(x=>{const t=Date.parse(x.deleted_at||'');if(t&&t<cut)DB.remove('lessons',x.id).catch(()=>{});});}
  if(!owner){
    const ids=new Set(S.students.map(s=>s.id)),uids=new Set(S.students.map(s=>s.uid).filter(Boolean));
    const mine=r=>ids.has(r.student_id)||(r.uid&&uids.has(r.uid));
    S.results=S.results.filter(mine);S.sentences=S.sentences.filter(mine);S.quizResults=S.quizResults.filter(mine);S.discussions=S.discussions.filter(mine);S.shadows=(S.shadows||[]).filter(mine);
    S.quizzes=S.quizzes.filter(qz=>(qz.assigned_ids||[]).some(id=>ids.has(id)));
  }
  S.admins=owner?await listAdmins():[];
  document.body.classList.toggle('is-admin',!owner);
  const bs=document.querySelector('.brand-sub');if(bs)bs.textContent=owner?'主管理員後台':('管理員 · '+(MY_EMAIL||''));
}
function splitResults(d){d=d||[];S.results=d.filter(x=>x.kind!=='sentence'&&x.kind!=='quizresult'&&x.kind!=='discussion'&&x.kind!=='shadow');S.sentences=d.filter(x=>x.kind==='sentence');S.quizResults=d.filter(x=>x.kind==='quizresult');S.discussions=d.filter(x=>x.kind==='discussion');S.shadows=d.filter(x=>x.kind==='shadow');}
function openModal(h){$('#modal-root').innerHTML=`<div class="overlay" data-overlay>${h}</div>`;}
function closeModal(){$('#modal-root').innerHTML='';}

function render(){
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===S.tab));
  $('#c-students').textContent=S.students.length;
  $('#c-lessons').textContent=S.lessons.length;
  {const pend=(S.results||[]).filter(r=>r.status==='pending').length;const el=$('#c-pending');if(el){el.textContent=pend;el.classList.toggle('hide',!pend);}}
  $$('.panel').forEach(p=>p.classList.add('hide'));
  $('#panel-'+S.tab).classList.remove('hide');
  try{({dashboard:renderDashboard,students:renderStudents,calendar:renderCalendar,lessons:renderLessons,grades:renderGrades,ops:renderOps}[S.tab])();}
  catch(err){const p=$('#panel-'+S.tab);if(p)p.innerHTML='<div class="card"><b>這個分頁顯示時發生問題</b><div class="hint" style="margin-top:6px">你的資料都還在、沒有遺失。請先按 Ctrl+Shift+R 重新整理；若仍這樣，把這行訊息回報給我：'+esc(((err&&err.message)||err)+'')+'</div></div>';}
}
function payInfo(due){if(!due)return null;const t=new Date();t.setHours(0,0,0,0);const d=new Date(due);if(isNaN(d))return null;d.setHours(0,0,0,0);const diff=Math.round((d-t)/86400000);
  if(diff<0)return{cls:'badge-overdue',label:'已逾期 '+(-diff)+' 天',sort:diff};
  if(diff===0)return{cls:'badge-soon',label:'今天到期',sort:0};
  if(diff<=7)return{cls:'badge-soon',label:diff+' 天後到期',sort:diff};
  return null;}
function studentProgress(s){const assigned=S.lessons.filter(l=>(l.assigned_ids||[]).includes(s.id)&&answerableOf(l.id).length);
  let done=0,pct=0,scored=0,sumPct=0;
  assigned.forEach(l=>{const r=resultOf(l.id,s.id);if(r){if(r.status==='done')done++;const tot=r.total||answerableOf(l.id).length;if(tot){sumPct+=Math.round(scoreOf(l,r)/tot*100);scored++;}}});
  pct=assigned.length?Math.round(done/assigned.length*100):0;
  return{total:assigned.length,done,pct,avg:scored?Math.round(sumPct/scored):null};}
function renderDashboard(){
  const body=$('#dashboard-body');
  if(!S.students.length){body.innerHTML=emptyHtml('📋','目前沒有待辦',IS_OWNER?'先到「學生名冊」新增學生。':'主管理員還沒有把學生分配給你。');return;}
  // 付款提醒
  const pays=S.students.map(s=>({s,info:payInfo(s.payment_date)})).filter(x=>x.info).sort((a,b)=>a.info.sort-b.info.sort);
  const payHtml=pays.length?pays.map(({s,info})=>`<div class="dash-row">
      <span class="avatar sm" style="background:${avColor(s.name)}">${esc((s.name||'?').slice(0,2))}</span>
      <b>${esc(s.name)}</b><span class="badge ${info.cls}">${info.label}</span>
      <span class="grow"></span><span class="muted">${money(s.tuition,s.currency)} · ${fmtDate(s.payment_date)}</span>
      ${s.email?`<button class="btn btn-sm" data-act="resetPw" data-id="${s.id}" title="寄重設密碼信">✉️</button>`:''}
    </div>`).join(''):`<div class="muted" style="padding:8px 2px">目前沒有即將到期或逾期的付款 👍</div>`;
  // 進度
  const progHtml=S.students.map(s=>{const p=studentProgress(s);
    return `<div class="dash-row">
      <span class="avatar sm" style="background:${avColor(s.name)}">${esc((s.name||'?').slice(0,2))}</span>
      <b>${esc(s.name)}</b>
      <span class="grow"></span>

  const lowSess=S.students.map(s=>({s,left:sessionsLeft(s)})).filter(x=>x.left!=null&&x.left<=1).sort((a,b)=>a.left-b.left);

  // 造句批改提醒
  const sentName=sd=>{const st=S.students.find(x=>x.id===sd.student_id);return (st&&st.name)||sd.student_name||'學生';};
  const sentLessonName=sd=>{const l=S.lessons.find(x=>x.id===sd.sent_lesson)||{};return (l.order_index?('第'+l.order_index+'課 '):'')+(l.title||'（課文）');};
  const sentPend=(S.sentences||[]).filter(x=>x.status==='submitted');
  const sentHtml=sentPend.length?sentPend.map(sd=>`<div class="dash-row"><span class="badge badge-soon">待批改</span><b>${esc(sentName(sd))}</b><span class="muted">${esc(sentLessonName(sd))}</span><span class="grow"></span><span class="muted">${(sd.items||[]).filter(it=>it.sentence).length} 句</span><button class="btn btn-sm btn-accent" data-act="reviewSent" data-id="${sd.id}">批改</button></div>`).join(''):`<div class="muted" style="padding:8px 2px">目前沒有待批改的造句 👍</div>`;
  // 隨堂小考
  const quizScore=(qid,sid)=>{const r=(S.quizResults||[]).find(x=>x.quiz_id===qid&&x.student_id===sid);return r?(r.score+'/'+r.total):null;};
  const quizSrcName=qz=>{if(qz.mode==='custom'){const n=(qz.quiz_items||'').split('\n').filter(s=>/[=＝]/.test(s)).length;return '自訂題目（'+n+' 題）';}const l=S.lessons.find(x=>x.id===qz.source_lesson)||{};return (l.textbook?('【'+l.textbook+'】'):'')+(l.order_index?('第'+l.order_index+'課'):'')+(l.title?(' '+l.title):'');};
  const QM={dict:'聽寫',pinyin:'看拼音寫字',mean:'看意思寫字',choice:'看字選意思',cloze:'看例句填生詞',custom:'自訂題目'};
  const quizRows=(S.quizzes||[]).slice().sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||'')).map(qz=>{const tgts=(qz.assigned_ids||[]).map(id=>S.students.find(s=>s.id===id)).filter(Boolean);const chips=tgts.map(s=>{const sc=quizScore(qz.id,s.id);return sc?`<button class="badge badge-ok" data-act="viewQuizResult" data-id="${qz.id}::${s.id}" style="cursor:pointer;border:0">${esc(s.name)}：${sc} 👁</button>`:`<span class="badge badge-pending">${esc(s.name)}：未考</span>`;}).join(' ');return `<div class="quiz-dash-row"><b>${esc(qz.title||'隨堂小考')}</b><span class="tag accent">${QM[qz.mode||'dict']}</span><span class="muted">${esc(quizSrcName(qz))}</span><span class="grow"></span>${chips||'<span class="muted">未指派</span>'}<button class="btn btn-sm" style="color:var(--danger)" data-act="delQuiz" data-id="${qz.id}">🗑</button></div>`;}).join('');
  // 問題與討論批改
  const discPend=(S.discussions||[]).filter(x=>x.status==='submitted');
  const discHtml=discPend.length?discPend.map(sd=>`<div class="dash-row"><span class="badge badge-soon">待批改</span><b>${esc(sentName(sd))}</b><span class="muted">${esc((()=>{const l=S.lessons.find(x=>x.id===sd.disc_lesson)||{};return (l.order_index?('第'+l.order_index+'課 '):'')+(l.title||'（課文）');})())}</span><span class="grow"></span><span class="muted">${Object.keys(sd.answers||{}).length} 題</span><button class="btn btn-sm btn-accent" data-act="reviewDisc" data-id="${sd.id}">批改</button></div>`).join(''):`<div class="muted" style="padding:8px 2px">目前沒有待批改的問題與討論 👍</div>`;
  // 統一待批改收件匣（作業／造句／問題與討論）
  const inbox=[];
  pendList.forEach(r=>{const st=S.students.find(x=>x.id===r.student_id),l=S.lessons.find(x=>x.id===r.lesson_id);inbox.push({tag:'作業',name:(st&&st.name)||'學生',sub:l?((l.order_index?('第'+l.order_index+'課 '):'')+(l.title||'')):'（課文）',extra:'',btn:`<button class="btn btn-sm btn-accent" data-act="tab" data-id="grades">去批改</button>`,ts:r.completed_at||r.updated_at||''});});
  sentPend.forEach(sd=>{inbox.push({tag:'造句',name:sentName(sd),sub:sentLessonName(sd),extra:(sd.items||[]).filter(it=>it.sentence).length+' 句',btn:`<button class="btn btn-sm btn-accent" data-act="reviewSent" data-id="${sd.id}">批改</button>`,ts:sd.submitted_at||''});});
  discPend.forEach(sd=>{const l=S.lessons.find(x=>x.id===sd.disc_lesson)||{};inbox.push({tag:'問題與討論',name:sentName(sd),sub:(l.order_index?('第'+l.order_index+'課 '):'')+(l.title||'（課文）'),extra:Object.keys(sd.answers||{}).length+' 題',btn:`<button class="btn btn-sm btn-accent" data-act="reviewDisc" data-id="${sd.id}">批改</button>`,ts:sd.submitted_at||''});});
  const shadowPend=(S.shadows||[]).filter(x=>x.status==='submitted');
  shadowPend.forEach(sd=>{const l=S.lessons.find(x=>x.id===sd.shadow_lesson)||{};const cnt=(sd.sents||[]).filter(s=>s&&s.audio_url).length;inbox.push({tag:'逐句跟讀',name:sentName(sd),sub:(l.order_index?('第'+l.order_index+'課 '):'')+(l.title||'（課文）')+(sd.dlg_title?(' · '+sd.dlg_title):''),extra:cnt+' 句錄音',btn:`<button class="btn btn-sm btn-accent" data-act="reviewShadow" data-id="${sd.id}">批改</button>`,ts:sd.submitted_at||''});});
  inbox.sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));
  const inboxHtml=inbox.length?inbox.map(it=>`<div class="dash-row"><span class="badge badge-soon">${it.tag}</span><b>${esc(it.name)}</b><span class="muted">${esc(it.sub)}</span><span class="grow"></span>${it.extra?`<span class="muted">${esc(it.extra)}</span>`:''}${it.btn}</div>`).join(''):`<div class="muted" style="padding:8px 2px">目前沒有待批改的項目 🎉</div>`;
  // 提醒（付款到期／逾期 + 堂數快用完），合併成一條條待辦
  const remRows=[];
  pays.forEach(({s,info})=>remRows.push(`<div class="dash-row"><span class="badge ${info.cls}">${info.label}</span><b>${esc(s.name)}</b><span class="grow"></span><span class="muted">💳 ${money(s.tuition,s.currency)}</span>${s.email?`<button class="btn btn-sm" data-act="resetPw" data-id="${s.id}" title="寄重設密碼信">✉️</button>`:''}</div>`));
  lowSess.forEach(({s,left})=>remRows.push(`<div class="dash-row"><span class="badge ${left<=0?'badge-overdue':'badge-soon'}">${left<=0?'堂數用完':'剩 '+left+' 堂'}</span><b>${esc(s.name)}</b><span class="grow"></span><span class="muted">🎟️ 已上 ${sessionsUsed(s)}/${esc(String(s.sessions_total))} 堂</span><button class="btn btn-sm" data-act="classLog" data-id="${s.id}">登記</button></div>`));
  const remHtml=remRows.length?remRows.join(''):`<div class="muted" style="padding:8px 2px">目前沒有需要提醒的事項 👍</div>`;
  const todoN=inbox.length+remRows.length;
  body.innerHTML=`<details class="dash-fold todo-hero" open><summary>📥 待批改${inbox.length?'（'+inbox.length+'）':''}</summary><div style="margin-top:10px">${inboxHtml}</div></details>

    <details class="dash-fold" style="margin-top:14px"><summary>📝 隨堂小考${(S.quizzes||[]).length?'（'+(S.quizzes||[]).length+'）':''}</summary>
      <div class="quiz-create-row" style="margin-top:10px"><button class="btn btn-sm btn-accent" data-act="newQuiz">＋ 建立隨堂小考</button><span class="muted">選一課的生詞，指派學生做聽寫，自動計分</span></div>${(S.quizzes||[]).length?('<div style="margin-top:10px">'+quizRows+'</div>'):''}</details>
    <details class="dash-fold" style="margin-top:14px"><summary>📈 學生進度</summary><div style="margin-top:10px">${progHtml}</div></details>`;
}

/* ---------- 課表／行事曆 ---------- */
function nextDateForDay(d,timeStr){const now=new Date();const jsDow=(d+1)%7;let diff=(jsDow-now.getDay()+7)%7;const tp=(timeStr||'00:00').split(':');const hh=Number(tp[0])||0,mm=Number(tp[1])||0;const c=new Date(now.getFullYear(),now.getMonth(),now.getDate()+diff,hh,mm,0);if(c<now)c.setDate(c.getDate()+7);return c;}
function gcalLink(title,start,endTime){const pad=n=>String(n).padStart(2,'0');const fmt=dt=>''+dt.getFullYear()+pad(dt.getMonth()+1)+pad(dt.getDate())+'T'+pad(dt.getHours())+pad(dt.getMinutes())+'00';const e=new Date(start);const ep=(endTime||'').split(':');if(ep.length>=2&&ep[0]!==''){e.setHours(Number(ep[0])||0,Number(ep[1])||0,0);}else{e.setHours(start.getHours()+1);}const dates=fmt(start)+'/'+fmt(e);return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(title)+'&dates='+dates+'&recur='+encodeURIComponent('RRULE:FREQ=WEEKLY');}
function renderCalendar(){const body=$('#calendar-body');const byDay={};
  S.students.forEach(s=>{(Array.isArray(s.schedule)?s.schedule:[]).forEach(slot=>{if(slot&&(slot.s||slot.e)){const d=(slot.d!=null?slot.d:0);(byDay[d]=byDay[d]||[]).push({stu:s,slot});}});});
  if(!Object.keys(byDay).length){body.innerHTML=emptyHtml('📅','還沒有課表','到「學生名冊」編輯學生、填上「上課時段」就會自動出現在這裡。');return;}
  let html='';const todayIdx=(new Date().getDay()+6)%7;
  for(let d=0;d<7;d++){const items=(byDay[d]||[]).slice().sort((a,b)=>(a.slot.s||'').localeCompare(b.slot.s||''));if(!items.length)continue;
    html+=`<div class="card" style="margin-bottom:12px"><div class="lesson-label">${DAYS[d]}${d===todayIdx?' <span class="badge badge-soon">今天</span>':''}</div>`+
      items.map(({stu,slot})=>{const time=(slot.s||'')+(slot.e?'–'+slot.e:'');const start=nextDateForDay(d,slot.s||'00:00');const gl=gcalLink((stu.name||'學生')+' 中文課',start,slot.e);
        const meet=/^https?:\/\//i.test(stu.meet_url||'')?`<a class="btn btn-sm btn-accent" href="${esc(stu.meet_url)}" target="_blank" rel="noopener">🎥 教室</a>`:'';
        return `<div class="dash-row"><span class="badge badge-pending">${esc(time||'—')}</span><b>${esc(stu.name)}</b><span class="muted">${esc(stu.class_type||'')}${stu.textbook?' · '+esc(stu.textbook):''}</span><span class="grow"></span>${meet}<a class="btn btn-sm" href="${esc(gl)}" target="_blank" rel="noopener">📅 加入日曆</a></div>`;}).join('')+`</div>`;}
  body.innerHTML=html;}

  body.innerHTML=`<div class="card"><div class="lesson-label">💰 各月收入</div>${incRows}</div><div class="card" style="margin-top:14px"><div class="lesson-label">💳 待收款</div>${dueRows}</div>${adminHtml}${annHtml}`;}

function lessonCardHtml(l,i){try{
    const ds=(Array.isArray(l.dialogues)&&l.dialogues.length)?l.dialogues:[{content:l.content,vocabulary:l.vocabulary,audio_url:l.audio_url}];
    const vocab=ds.map(d=>d.vocabulary||'').join('\n').split('\n').map(v=>v.trim()).filter(Boolean);const hasAudio=ds.some(d=>d.audio_url);
    const qn=questionsOf(l.id).length, an=(l.assigned_ids||[]).length, di=dueInfo(l.due_date);
    const open=S.openCards&&S.openCards.has(l.id);const built=l.build==='done';
    return `<div class="card lesson-card${open?' open':''}">
      <div class="row-between lesson-head" data-act="toggleCard" data-id="${l.id}"><div style="display:flex;gap:14px;align-items:center">
        <div class="lesson-no">${l.order_index||i+1}</div>
        <div><h3>${esc(l.title)} <span class="badge ${built?'badge-ok':'badge-soon'}" style="vertical-align:middle">${built?'✅ 完成':'🟡 進行中'}</span></h3><div class="meta" style="margin-top:5px;align-items:center">
          <span>📝 ${qn} 題</span><span>📖 生詞 ${vocab.length}</span>${hasAudio?'<span class="tag gold">🔊 有音檔</span>':''}
          <span>👤 指派 ${an}</span>${di?`<span class="badge ${di.cls}">${di.label}</span>`:''}</div></div></div>
        <span class="card-chev" aria-hidden="true">${open?'▾':'▸'}</span></div>
      ${open?`<div class="actions" style="margin-top:14px;flex-wrap:wrap">
        <button class="btn btn-sm ${built?'':'btn-accent'}" data-act="toggleBuild" data-id="${l.id}">${built?'↩ 改回進行中':'✅ 標記完成'}</button>
        <button class="btn btn-sm" data-act="editLesson" data-id="${l.id}">編輯課文</button>
        ${((((l.dialogues&&l.dialogues.length)||0)+((l.grammar_points&&l.grammar_points.length)||0))>=2)?`<button class="btn btn-sm" data-act="orderLayout" data-id="${l.id}">📐 課文順序</button>`:''}
        <button class="btn btn-sm btn-accent" data-act="questions" data-id="${l.id}">練習題（${qn}）</button>
        <button class="btn btn-sm" data-act="previewLesson" data-id="${l.id}">👁 預覽</button>
        <button class="btn btn-sm" data-act="printWorksheet" data-id="${l.id}">🖨 作業卷</button>
        <button class="btn btn-sm" data-act="assign" data-id="${l.id}">指派${an?`（${an}）`:''}</button>
        ${an?`<button class="btn btn-sm btn-warn" data-act="unassign" data-id="${l.id}">↩ 收回</button>`:''}
        <button class="btn btn-sm" data-act="dupLesson" data-id="${l.id}">📋 複製</button>
        <button class="btn btn-sm btn-danger" data-act="delLesson" data-id="${l.id}">刪除</button></div>`:''}</div>`;
  }catch(err){return `<div class="card"><h3>${esc((l&&l.title)||'（未命名課文）')}</h3><div class="hint" style="color:var(--danger);margin-top:6px">這一課顯示時出了點問題（資料沒有遺失，可照常編輯或刪除）。</div><div class="actions" style="margin-top:10px"><button class="btn btn-sm" data-act="editLesson" data-id="${l.id}">編輯課文</button><button class="btn btn-sm btn-accent" data-act="questions" data-id="${l.id}">練習題</button><button class="btn btn-sm btn-danger" data-act="delLesson" data-id="${l.id}">刪除</button></div></div>`;}}
function renderLessons(){
  const wrap=$('#lessons-list');
  if(!S.lessons.length){wrap.innerHTML=emptyHtml('📚','還沒有內容','點「新增課文／作業」：可放課文＋練習題，或只出補充作業（課文留空）。');return;}
  const ls=sortLessons(S.lessons);
  const books=[...new Set(ls.map(l=>(l.textbook||'').trim()).filter(Boolean))].sort();
  const hasUncat=ls.some(l=>!(l.textbook||'').trim());const filter=S.bookFilter||'';
  let html='';
  if(books.length){html+='<div class="book-bar"><span class="book-bar-lbl">📚 教材</span>'+
    '<button class="book-tab '+(!filter?'on':'')+'" data-act="bookFilter" data-id="">全部</button>'+
    books.map(b=>'<button class="book-tab '+(filter===b?'on':'')+'" data-act="bookFilter" data-id="'+esc(b)+'">'+esc(b)+'</button>').join('')+
    (hasUncat?'<button class="book-tab '+(filter==='__none'?'on':'')+'" data-act="bookFilter" data-id="__none">未分類</button>':'')+'</div>';}
  const anyOpen=ls.some(l=>S.openCards.has(l.id));
  html+='<div class="list-tools"><span class="hint">點任一課可展開操作按鈕</span><button class="btn btn-sm btn-ghost" data-act="toggleAllCards">'+(anyOpen?'▴ 全部收起':'▾ 全部展開')+'</button></div>';
  const groups={};ls.forEach(l=>{const b=(l.textbook||'').trim()||'__none';(groups[b]||(groups[b]=[])).push(l);});
  let show;if(filter==='__none')show=['__none'];else if(filter)show=[filter];else{show=books.slice();if(hasUncat)show.push('__none');}
  if(!books.length)show=['__none'];
  html+=show.filter(b=>groups[b]&&groups[b].length).map(b=>{
    const cards=groups[b].map((l,i)=>lessonCardHtml(l,i)).join('');
    return books.length?`<div class="book-group"><div class="book-head">${esc(b==='__none'?'未分類':b)} <span class="count">${groups[b].length}</span></div>${cards}</div>`:cards;
  }).join('');
  wrap.innerHTML=html;
}

/* ---------- 練習題管理 ---------- */
function openQuestionsModal(lid){
  const l=S.lessons.find(x=>x.id===lid);if(!l)return;const qs=sortQuestionsLogical(questionsOf(lid));
  const secs=[];let cur=null;
  qs.forEach(q=>{const k=qSecKey(q);
    if(!cur||cur.key!==k){const gpTag=(q.gp_index!=null&&(l.grammar_points||[])[q.gp_index])?('語法 '+(q.gp_index+1)+(q.gp_sub?(' · '+esc((q.gp_sub||'').trim())):'')):'未指定語法（綜合練習）';cur={key:k,label:gpTag,items:[]};secs.push(cur);}
    cur.items.push(q);});
  const rowHtml=(q,i)=>`<div class="qe-row"><span class="q-num">${i+1}</span>
     <div class="grow"><div class="qe-t"><span class="tag accent">${TYPE_LABELS[q.type]||q.type}</span> ${q.audio_url?'<span class="tag gold">🔊 聽力</span>':''}${q.image_url?'<span class="tag">🖼 照片</span>':''}${(q.gp_index!=null&&(l.grammar_points||[])[q.gp_index])?`<span class="tag">📘 語法${q.gp_index+1}${q.gp_sub?(' '+esc(q.gp_sub)):''}</span>`:''}${(q.type==='fill'&&q.input_mode==='write')?'<span class="tag">✍️ 手寫</span>':''}</div>
     <div class="qe-p">${esc(q.prompt||'（無題目）')}</div></div>
     <button class="btn btn-sm" data-act="editQuestion" data-id="${lid}::${q.id}">編輯</button>
     <button class="btn btn-sm btn-danger" data-act="delQuestion" data-id="${lid}::${q.id}">刪除</button></div>`;
  const body=secs.map(sec=>`<details class="qe-secfold"><summary class="qe-sechd">${sec.label}<span class="qe-sec-n">${sec.items.length} 題</span></summary><div class="qe-secbody">${sec.items.map(rowHtml).join('')}</div></details>`).join('');
  const rowsHtml=qs.length?body:'<div class="empty" style="padding:26px"><b>還沒有題目</b><div style="margin-top:4px">點下方「新增題目」開始出題。</div></div>';
  const tools=qs.length?`<div class="qe-tools"><span class="hint">點各節標題展開／收起；題號每節從 1 算。</span><span style="flex:1"></span><button class="btn btn-sm btn-ghost" data-act="qExpandAll">▾ 全部展開</button><button class="btn btn-sm btn-ghost" data-act="autoOrderQuestions" data-id="${lid}">↕ 自動排序</button></div>`:'';
  openModal(`<div class="modal wide"><div class="modal-head"><h3>${esc(l.title)} · 練習題</h3><button class="x" data-act="closeModal">×</button></div>
   <div class="modal-body">${tools}${rowsHtml}</div>
   <div class="modal-foot"><button class="btn btn-ghost" data-act="closeModal">關閉</button>
     <button class="btn" data-act="bulkImport" data-id="${lid}">⬆ 批次匯入</button>
     <button class="btn btn-primary" data-act="addQuestion" data-id="${lid}">＋ 新增題目</button></div></div>`);
}

let QE_TYPE='choice';
function qeFieldsHTML(type,q){q=q||{};const opt=q.options||[];
  if(type==='choice'){const lines=Array.isArray(opt)?opt.join('\n'):'';const correct=(typeof q.answer==='number')?(q.answer+1):'';
    return `<div class="field"><label>選項 <span class="hint">每行一個</span></label><textarea id="qe-options" placeholder="選項一&#10;選項二&#10;選項三">${esc(lines)}</textarea></div>
      <div class="field"><label>正確答案 <span class="hint">填第幾個選項（1、2、3…）</span></label><input id="qe-correct" type="number" min="1" value="${correct}"></div>`;}
  if(type==='fill'){const acc=Array.isArray(q.answer)?q.answer.join('\n'):'';const md=q.input_mode||'type';
    return `<div class="field"><label>作答方式</label><select id="qe-fillmode">
        <option value="type"${md==='type'?' selected':''}>打字輸入（自動批改）</option>
        <option value="write"${md==='write'?' selected':''}>手寫漢字（畫布；上課內容可自我對照，作業由你批改）</option></select></div>
      <div class="hint" style="margin-bottom:8px">打字模式：題目中用 <b>___</b>（三條底線）代表填空處。手寫模式：學生在格子裡寫漢字。</div>
      <div class="field"><label>答案 <span class="hint">每行一個；打字模式＝相符即算對；手寫模式＝參考答案／學生自我對照</span></label><textarea id="qe-accept" placeholder="謝謝&#10;謝謝你">${esc(acc)}</textarea></div>`;}
  if(type==='order'){const segs=Array.isArray(opt)?opt.join('\n'):'';
    return `<div class="field"><label>正確順序 <span class="hint">每行一個詞／字，依正確順序</span></label><textarea id="qe-segs" placeholder="我&#10;每天&#10;喝&#10;咖啡">${esc(segs)}</textarea>
      <div class="hint" style="margin-top:4px">學生會看到打散的詞，要排回正確順序。</div></div>`;}
  if(type==='write'){const ref=Array.isArray(q.answer)?q.answer.join(''):'';
    return `<div class="hint" style="margin-bottom:8px">學生會看到上面的「題目」並在格子裡手寫漢字（例如題目寫「請寫出：謝謝（xièxie）」）。送出後你在「成績總覽」批改。</div>
      <div class="field"><label>參考答案 <span class="hint">選填，批改時顯示給你對照，例如「謝謝」</span></label><input id="qe-ref" type="text" value="${esc(ref)}"></div>`;}
  if(type==='speak'){return `<div class="hint" style="margin-bottom:8px">學生會看到上面的「題目」，按麥克風錄一段唸給你聽；送出後你在「成績總覽」播放並批改。可在下方「聽力音檔」放一段示範發音給學生跟讀（選填）。</div>`;}
  if(type==='note'){return `<div class="hint" style="margin-bottom:8px">示範題：只給學生「看」課本提供的例句／說明，<b>不用作答、不計分</b>。把要顯示的內容打在上面的「題目」欄（可多行）；也可加照片或音檔。</div>`;}
  if(type==='qa'){const ref=Array.isArray(q.answer)?q.answer.join('\n'):'';
    return `<div class="hint" style="margin-bottom:8px">問答題：學生看到上面的「題目」，用打字寫出完整回答（可多行）。送出後你在「成績總覽」批改。</div>
      <div class="field"><label>參考答案 <span class="hint">選填，批改時顯示給你對照、作答後也給學生對照</span></label><textarea id="qe-ref" placeholder="例：他是美國人。">${esc(ref)}</textarea></div>`;}
  if(type==='opt'){const opts=Array.isArray(opt)?opt.join('\n'):'';const items=Array.isArray(q.items)?q.items.map(it=>(it.mode==='open'?'* ':'')+(it.text||'')).join('\n'):'';
    return `<div class="hint" style="margin-bottom:8px">選填題（像課本「看 a–d 完成對話」）：學生會看到共用的 <b>a、b、c…</b> 選項框，<b>每一小題下面</b>都有自己的 a／b／c／d 可<b>點選</b>（<b>可複選</b>）；要「<b>自己回答</b>」的小題，開頭加 <b>*</b>，學生會看到打字框。<b>不自動算分</b>，由你在「成績總覽」批改。</div>

/* ---------- 成績：作答呈現與對錯判斷 ---------- */
function normT(s){return (s==null?'':s.toString()).trim().toLowerCase().replace(/\s+/g,'');}
function reconFillT(p,arr){const parts=(p||'').split(/[_＿]{2,}/);const bt=parts.length>2?parts.slice(1,parts.length-1):[];let s=(arr&&arr[0])||'';for(let k=1;k<(arr?arr.length:0);k++)s+=(bt[k-1]||'')+(arr[k]||'');return s;}
function qCorrect(q,resp){
  if(resp==null||resp===''||(Array.isArray(resp)&&!resp.join('')))return null;
  if(q.type==='choice')return Number(resp)===Number(q.answer);
  if(q.type==='fill'){const r=Array.isArray(resp)?normT(reconFillT(q.prompt,resp)):normT(resp);return (q.answer||[]).map(normT).includes(r);}
  if(q.type==='order')return (resp||[]).join('')===(q.options||[]).join('');
  if(q.type==='match')return (q.options||[]).length>0&&(q.options||[]).every((p,i)=>(resp||[])[i]===p.r);
  return null;}
function ansHtml(q,resp){
  if(resp==null||resp===''||(Array.isArray(resp)&&!resp.join('')))return '<span class="hint">（未作答）</span>';
  if(q.type==='speak')return `<audio class="rec-audio" controls src="${esc(resp)}"></audio>`;
  if(q.type==='write'||(q.type==='fill'&&q.input_mode==='write'))return `<img class="hw-img" src="${esc(resp)}" alt="">`;
  if(q.type==='qa')return `<div class="hw-textans">${esc(typeof resp==='string'?resp:'').replace(/\n/g,'<br>')}</div>`;
  if(q.type==='opt'){const ans=Array.isArray(resp)?resp:[];return '<div class="gd-opt">'+(q.items||[]).map((it,i)=>{const r=ans[i]||{};const a=it.mode==='open'?(esc(r.t||'')||'<span class="hint">（未答）</span>'):((r.s||[]).map(oi=>String.fromCharCode(97+oi)+'. '+esc((q.options||[])[oi]||'')).join('；')||'<span class="hint">（未選）</span>');const qline=esc((it.text||'').split('\n').pop()||'');return `<div style="margin:3px 0"><b>${i+1}.</b> <span class="hint">${qline}</span><br>　${a}</div>`;}).join('')+'</div>';}
  if(q.type==='choice'){const o=(q.options||[])[Number(resp)];return `<div class="gd-text">${esc(o!=null?o:resp)}</div>`;}
  if(q.type==='fill'){const v=Array.isArray(resp)?reconFillT(q.prompt,resp):resp;return `<div class="gd-text">${esc(v)}</div>`;}
  if(q.type==='order')return `<div class="gd-text">${esc((resp||[]).join(' '))}</div>`;
  if(q.type==='match')return `<div class="gd-text">${esc((q.options||[]).map((p,i)=>p.l+'→'+((resp||[])[i]||'？')).join('、'))}</div>`;
  return `<div class="gd-text">${esc(String(resp))}</div>`;}
function gdRefText(q){if(q.type==='match')return (q.options||[]).map(p=>p.l+'→'+p.r).join('、');if(q.type==='order')return (q.options||[]).join(' ');if(q.type==='choice')return (q.options||[])[Number(q.answer)]||'';return (q.answer||[]).join(' / ');}
/* 批改罐頭評語：點一下插入到指定的評語框，省打字 */
const FB_PRESETS=['很好，繼續保持！','有進步，加油！','大致正確，注意細節。','請再複習這課的語法。','發音很清楚！','記得多練習生詞。','句子很通順，很棒！','有錯字，請訂正。','理解正確，表達再完整一些。','很用心，讚！'];
function cannedBar(tgt){return '<div class="canned-bar">'+FB_PRESETS.map(t=>`<button type="button" class="canned-chip" data-act="canned" data-id="${esc(tgt)}" data-t="${esc(t)}">${esc(t)}</button>`).join('')+'</div>';}
function studentReviewHtml(l,s,r){const qs=answerableOf(l.id);const qn=qs.length;
  const perQ=qs.map((q,qi)=>{const resp=(r.answers||{})[q.id];const fb=(r.feedback||{})[q.id]||'';const man=manualQ(q);const mk=(r.manual||{})[q.id];
    const corr=man?(mk==='done'?true:(mk==='wrong'?false:null)):qCorrect(q,resp);
    const badge=corr===true?'<span class="gd-ok">✓ 對</span>':corr===false?'<span class="gd-no">✗ 錯</span>':(man?'<span class="badge badge-soon">待批改</span>':'<span class="hint">—</span>');
    const ref=gdRefText(q);

    return `<div class="gd-q"><div class="gd-qhead"><span class="q-num">${qi+1}</span><span class="tag accent">${TYPE_LABELS[q.type]||q.type}</span> ${badge}</div>
      <div class="gd-prompt">${esc(q.prompt||'（無題目）')}</div>
      <div class="gd-ans">${ansHtml(q,resp)}</div>

      <input class="gd-fb" type="text" data-fb="${r.id}::${q.id}" value="${esc(fb)}" placeholder="這題的修改建議（選填，學生看得到）"></div>`;}).join('');
  return `<div class="gd-stubody">${perQ}
    <div class="gd-overall"><label>整體評語 / 修改建議 <span class="hint">學生會在「成績」看到</span></label><textarea class="gd-cmt" id="cmt-${r.id}" placeholder="給這位學生的整體建議…">${esc(r.comment||'')}</textarea>${cannedBar('cmt-'+r.id)}</div>

/* 臺灣常見讀音修正（與大陸不同者） */
const TW_PY_T={'期':'qí','究':'jiù','質':'zhí','危':'wéi','企':'qì','暫':'zhàn','攜':'xī','液':'yì','垃':'lè','圾':'sè','蝸':'guā','跌':'dié'};
function twPyT(han){try{const arr=pinyinPro.pinyin(han,{type:'all',toneType:'symbol'});return arr.map(o=>o.isZh?(TW_PY_T[o.origin]||o.pinyin):o.origin).join(' ');}catch(e){return '';}}
function stripLatinBr(s){return (s||'').replace(/[\[【]([^\]】]*)[\]】]/g,(m,inner)=>/[㐀-鿿]/.test(inner)?m:'').replace(/\s{2,}/g,' ');}
H.dlgAutoPinyin=(i)=>{if(!window.pinyinPro){toast('拼音元件還在載入，請稍候再按一次');return;}
  const ta=document.querySelector('.dlg-vocab-in[data-i="'+i+'"]');if(!ta)return;let n=0;
  const out=ta.value.split('\n').map(line=>{const raw=line;if(!line.trim())return raw;
    let front;
    if(/[｜|]/.test(raw)){front=raw.split(/[｜|]/)[0];}
    else{let s=raw.replace(/[（(][^（）()]*[）)]/,' ');if(/[=＝]/.test(s))front=s.split(/[=＝]/)[0];else{const m=s.search(/[：:\s]/);front=(m<0?s:s.slice(0,m));}}
    const han=(front||'').replace(/[^㐀-鿿]/g,'');if(!han)return raw;
    const idx=raw.indexOf(front);const cut=(idx>=0?idx:0)+front.length;const head=raw.slice(0,cut),rest=raw.slice(cut);
    // 漢字（首欄）裡已含拼音 → 保留，只清掉翻譯/例句裡誤植的拼音
    if(/[\[【][^\]】]*[\]】]/.test(head)){return head+stripLatinBr(rest);}
    // 漢字後面緊接著就有拼音 → 保留（老師的臺灣拼音優先），只清掉誤植的
    if(/^\s*[\[【][^\]】]*[\]】]/.test(rest)){const m2=rest.match(/^(\s*[\[【][^\]】]*[\]】])([\s\S]*)$/);return head+(m2?m2[1]:'')+stripLatinBr(m2?m2[2]:'');}
    // 否則：清掉整行誤植的拼音，只在漢字後補上拼音
    let py='';try{py=twPyT(han);}catch(e){return raw;}if(!py)return raw;n++;
    return head.replace(/\s*$/,'')+'['+py+']'+stripLatinBr(rest);});
  ta.value=out.join('\n');toast(n?('已為 '+n+' 個詞加上拼音（只加漢字，可再修改）'):'已整理完成（只保留漢字拼音）');};

let LAYOUT=[],LAYOUT_LID=null;
function reconcileLayoutT(l){const ds=Array.isArray(l.dialogues)?l.dialogues:[];const nd=ds.length||((l.content||l.vocabulary||l.audio_url)?1:0);const ng=(l.grammar_points||[]).length;const hasQ=i=>!!(ds[i]&&(ds[i].discussion||'').split('\n').some(s=>s.trim()));const hasV=i=>!!(ds[i]&&(ds[i].vocabulary||'').trim());const saved=Array.isArray(l.layout)?l.layout:[];
  const out=[],sd=new Set(),sg=new Set(),sq=new Set(),sv=new Set();
  saved.forEach(e=>{if(!e)return;if(e.t==='d'&&e.i<nd&&!sd.has(e.i)){out.push({t:'d',i:e.i});sd.add(e.i);}else if(e.t==='v'&&e.i<nd&&hasV(e.i)&&!sv.has(e.i)){out.push({t:'v',i:e.i});sv.add(e.i);}else if(e.t==='g'&&e.i<ng&&!sg.has(e.i)){out.push({t:'g',i:e.i});sg.add(e.i);}else if(e.t==='q'&&e.i<nd&&hasQ(e.i)&&!sq.has(e.i)){out.push({t:'q',i:e.i});sq.add(e.i);}});
  for(let i=0;i<nd;i++)if(!sd.has(i))out.push({t:'d',i});
  for(let i=0;i<ng;i++)if(!sg.has(i))out.push({t:'g',i});
  for(let i=0;i<nd;i++){if(hasV(i)&&!sv.has(i)){const pos=out.findIndex(e=>e.t==='d'&&e.i===i);if(pos>=0)out.splice(pos+1,0,{t:'v',i});else out.push({t:'v',i});}}
  for(let i=0;i<nd;i++){if(hasQ(i)&&!sq.has(i)){const vp=out.findIndex(e=>e.t==='v'&&e.i===i);const dp=out.findIndex(e=>e.t==='d'&&e.i===i);const at=vp>=0?vp:dp;if(at>=0)out.splice(at+1,0,{t:'q',i});else out.push({t:'q',i});}}
  return out;}
function ordLabel(l,e){if(e.t==='d'){const d=(l.dialogues||[])[e.i]||{};return '📖 '+((d.title||'').trim()||('對話'+(e.i+1)));}if(e.t==='v'){const d=(l.dialogues||[])[e.i]||{};return '📒 生詞'+((d.title||'').trim()?('（'+d.title.trim()+'）'):'');}if(e.t==='q'){const d=(l.dialogues||[])[e.i]||{};return '💬 問題與討論'+((d.title||'').trim()?('（'+d.title.trim()+'）'):'');}const g=(l.grammar_points||[])[e.i]||{};return '🔤 語法 '+(e.i+1)+((g.title||'').trim()?('：'+g.title.trim()):'');}
function ordListHtml(l){return LAYOUT.map((e,idx)=>`<div class="ord-row" draggable="true" data-idx="${idx}"><span class="ord-grip" aria-hidden="true">⠿</span><b style="flex:1;min-width:0">${esc(ordLabel(l,e))}</b><button class="btn btn-sm" type="button" data-act="ordUp" data-id="${idx}" ${idx===0?'disabled':''}>↑</button><button class="btn btn-sm" type="button" data-act="ordDown" data-id="${idx}" ${idx===LAYOUT.length-1?'disabled':''}>↓</button></div>`).join('');}
function ordRerender(){const l=S.lessons.find(x=>x.id===LAYOUT_LID),c=document.getElementById('ord-list');if(c&&l)c.innerHTML=ordListHtml(l);}
let ORD_DRAG=null;
document.addEventListener('dragstart',e=>{const r=e.target&&e.target.closest&&e.target.closest('.ord-row');if(r&&r.dataset.idx!=null){ORD_DRAG=Number(r.dataset.idx);r.classList.add('dragging');try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',ORD_DRAG+'');}catch(_){}}});
document.addEventListener('dragend',()=>{document.querySelectorAll('.ord-row.dragging,.ord-row.dragover').forEach(x=>x.classList.remove('dragging','dragover'));ORD_DRAG=null;});
document.addEventListener('dragover',e=>{const r=e.target&&e.target.closest&&e.target.closest('.ord-row');if(r&&ORD_DRAG!=null){e.preventDefault();try{e.dataTransfer.dropEffect='move';}catch(_){}document.querySelectorAll('.ord-row.dragover').forEach(x=>x.classList.remove('dragover'));r.classList.add('dragover');}});
document.addEventListener('drop',e=>{const r=e.target&&e.target.closest&&e.target.closest('.ord-row');if(r&&ORD_DRAG!=null){e.preventDefault();const to=Number(r.dataset.idx),from=ORD_DRAG;if(to!==from){const item=LAYOUT.splice(from,1)[0];LAYOUT.splice(to>from?to-1:to,0,item);ordRerender();}}ORD_DRAG=null;});
H.report=(sid)=>{const s=S.students.find(x=>x.id===sid);if(!s)return;

  const TN={choice:'單選',fill:'填空',order:'重組',match:'配對'};const agg={};
  assigned.forEach(l=>{const r=resultOf(l.id,sid);if(!r||!r.answers)return;questionsOf(l.id).forEach(q=>{if(!TN[q.type])return;const c=qCorrect(q,r.answers[q.id]);if(c===null)return;agg[q.type]=agg[q.type]||{ok:0,n:0};agg[q.type].n++;if(c)agg[q.type].ok++;});});

   <div class="modal-body">

function vaReset(){}
function convVocabImport(text){
  text=(text||'').replace(/\r/g,'');
  // 課本格式常常一整段、詞與詞之間只用空白分隔（欄位用｜）。先在每個「中文…｜」前面斷行，切成一筆一行。
  text=text.replace(/[ \t　\n]+(?=[一-鿿][一-鿿／/]*[｜|])/g,'\n');
  return text.split('\n').map(line=>{
    if(!line.trim())return '';
    const cols=line.split(/\t|\s*[｜|]\s*/);
    if(cols.length<2)return line.trim();
    const word=(cols[0]||'').trim();if(!word)return '';
    const pos=(cols[1]||'').trim(),trans=(cols[2]||'').trim();
    const exs=cols.slice(3).map(s=>s.trim()).filter(Boolean);
    let out=word+(pos?(' ('+pos+')'):'')+(trans?('='+trans):'');
    exs.forEach(e=>{out+='\n- '+e;});
    return out;
  }).filter(l=>l!=='').join('\n');}
H.vocabImport=(i)=>{const imp=document.querySelector('.dlg-imp-in[data-i="'+i+'"]'),ta=document.querySelector('.dlg-vocab-in[data-i="'+i+'"]');if(!imp||!ta)return;
  const conv=convVocabImport(imp.value);if(!conv.trim()){toast('請先貼上要匯入的內容');return;}
  ta.value=(ta.value.replace(/\s+$/,'')?ta.value.replace(/\s+$/,'')+'\n':'')+conv;if(DLG[i])DLG[i].vocabulary=ta.value;imp.value='';toast('已加入上面的生詞欄，記得最後按「儲存」');};
function vaWords(i){const t=document.querySelector('.dlg-vocab-in[data-i="'+i+'"]');const txt=t?t.value:((DLG[i]&&DLG[i].vocabulary)||'');
  return txt.split('\n').map(s=>s.trim()).filter(s=>s&&!/^[-－・·→*]/.test(s)&&!/^例[:：]/.test(s)).map(s=>{
    if(/[｜|]/.test(s))return s.split(/\s*[｜|]\s*/)[0].replace(/[\[【][^\]】]*[\]】]/,'').trim();
    s=s.replace(/[\[【][^\]】]*[\]】]/,'').replace(/[（(][^（）()]*[）)]/,'').trim();if(/[=＝]/.test(s))return s.split(/[=＝]/)[0].trim();const m=s.search(/[：:\s]/);return (m<0?s:s.slice(0,m)).trim();}).filter(Boolean);}
function _loudness(buf){const d=buf.getChannelData(0),sr=buf.sampleRate,win=Math.max(1,Math.floor(sr*0.02)),loud=[];for(let i=0;i<d.length;i+=win){let s=0,n=0;for(let j=i;j<i+win&&j<d.length;j++){s+=d[j]*d[j];n++;}loud.push(Math.sqrt(s/(n||1)));}return {loud,winSec:win/sr,dur:buf.duration};}
function _gate(L,thr,minSil,minDur,startSec){const loud=L.loud,w=L.winSec,segs=[];let start=-1,sil=0;const k0=Math.max(0,Math.floor((startSec||0)/w));for(let k=k0;k<loud.length;k++){if(loud[k]>thr){if(start<0)start=k*w;sil=0;}else{if(start>=0){sil+=w;if(sil>=minSil){const end=k*w-sil+w;if(end-start>=minDur)segs.push({s:+start.toFixed(2),e:+end.toFixed(2)});start=-1;sil=0;}}}}if(start>=0){const end=loud.length*w;if(end-start>=minDur)segs.push({s:+start.toFixed(2),e:+end.toFixed(2)});}return segs;}
function _thr(L){const s=L.loud.slice().sort((a,b)=>a-b);const noise=s[Math.floor(s.length*0.15)]||0,peak=s[Math.floor(s.length*0.95)]||0.1;return Math.max(noise*3,(noise+peak)*0.18,0.006);}
function vaAutoStart(L,wc){const thr=_thr(L);let ms=0.18,segs=_gate(L,thr,ms,0.12,0);
  if(segs.length<wc){for(const m of [0.14,0.11,0.09,0.07]){const sg=_gate(L,thr,m,0.12,0);if(sg.length>segs.length){segs=sg;ms=m;}if(segs.length>=wc)break;}}
  if(segs.length<=wc)return {start:0,ms};
  const startSeg=segs[segs.length-wc];return {start:+(Math.max(0,startSeg.s-0.05)).toFixed(2),ms};}
H.pickVocabAudio=(i)=>{const f=document.getElementById('file-va-'+i);if(f){f.dataset.di=i;f.click();}};
async function vaHandleFile(file,i){const d=DLG[i];if(!d)return;const st=document.getElementById('va-status-'+i);if(st)st.textContent='分析中…';
  if(d._va&&d._va.url){try{URL.revokeObjectURL(d._va.url);}catch(_){}}
  let loud;try{const ab=await file.arrayBuffer();const ctx=new (window.AudioContext||window.webkitAudioContext)();const buf=await ctx.decodeAudioData(ab);ctx.close&&ctx.close();loud=_loudness(buf);}
  catch(e){if(st)st.textContent='無法讀取音檔：'+(e.message||e);return;}
  const words=vaWords(i);if(!words.length){if(st)st.textContent='請先在這段「生詞」欄輸入生詞（每行一個），再上傳音檔。';return;}
  const a=vaAutoStart(loud,words.length);
  d._va={file,url:URL.createObjectURL(file),loud,start:a.start,ms:a.ms,segs:_gate(loud,_thr(loud),a.ms,0.12,a.start)};
  const c=document.getElementById('va-controls-'+i);if(c)c.classList.remove('hide');
  const tr=document.getElementById('va-trim-'+i);if(tr){tr.max=Math.ceil(loud.dur);tr.value=a.start;}const tv=document.getElementById('va-trim-val-'+i);if(tv)tv.textContent=a.start.toFixed(1);
  const sl=document.getElementById('va-sens-'+i);if(sl)sl.value=Math.round(a.ms*100);
  vaRenderPreview(i);}
function vaRenderPreview(i){const d=DLG[i];if(!d||!d._va)return;const words=vaWords(i);let segs=d._va.segs||[];
  if(segs.length!==words.length){const a=[];let cur=segs.length?0:0;for(let k=0;k<words.length;k++){if(segs[k]){a.push({s:+segs[k].s,e:+segs[k].e});cur=segs[k].e;}else{a.push({s:+cur.toFixed(2),e:+(cur+0.6).toFixed(2)});cur+=1.2;}}d._va.segs=a;segs=a;}
  const st=document.getElementById('va-status-'+i);if(st)st.textContent='共 '+words.length+' 個生詞。可直接改每個字的「開始～結束」秒數，點 ▶ 試聽確認；數字不準就微調即可。';
  const pv=document.getElementById('va-preview-'+i);if(pv)pv.innerHTML='<div class="va-list">'+words.map((w,k)=>{const sg=segs[k]||{s:0,e:0.6};return `<div class="va-row"><span class="va-w">${esc(w)}</span><input class="va-time" type="number" step="0.05" min="0" data-di="${i}" data-k="${k}" data-edge="s" value="${(+sg.s).toFixed(2)}"><span class="va-dash">–</span><input class="va-time" type="number" step="0.05" min="0" data-di="${i}" data-k="${k}" data-edge="e" value="${(+sg.e).toFixed(2)}"><span class="hint">秒</span><button class="btn btn-sm" type="button" data-act="vaPlay" data-id="${i}::${k}">▶ 試聽</button></div>`;}).join('')+'</div>';}
H.vaRedetect=(i)=>{const d=DLG[i];if(!d||!d._va||!d._va.loud)return;const ms=Number((document.getElementById('va-sens-'+i)||{value:20}).value)/100;const start=Number((document.getElementById('va-trim-'+i)||{value:0}).value)||0;d._va.ms=ms;d._va.start=start;const tv=document.getElementById('va-trim-val-'+i);if(tv)tv.textContent=start.toFixed(1);d._va.segs=_gate(d._va.loud,_thr(d._va.loud),ms,0.12,start);vaRenderPreview(i);};
H.vaPlay=(key)=>{const p=String(key).split('::');const i=+p[0],k=+p[1];const d=DLG[i];if(!d||!d._va)return;const seg=(d._va.segs||[])[k];if(!seg||!d._va.url)return;const a=window._vaAudio||(window._vaAudio=new Audio());a.ontimeupdate=null;a.src=d._va.url;const go=()=>{try{a.currentTime=seg.s;}catch(_){}a.ontimeupdate=()=>{if(a.currentTime>=seg.e){a.pause();a.ontimeupdate=null;}};a.play().catch(()=>{});};if(a.readyState>=1)go();else a.onloadedmetadata=go;};
async function ensureAuthFresh(){const u=window.firebase&&firebase.auth&&firebase.auth().currentUser;if(!u)throw new Error(RELOGIN_MSG);try{await u.getIdToken(true);}catch(e){throw new Error(RELOGIN_MSG);}}
async function uploadVocabAudio(file){await ensureAuthFresh();const ext=((file.name.split('.').pop())||'mp3').replace(/[^a-z0-9]/gi,'')||'mp3';const ref=firebase.storage().ref('vocab_audio/'+Date.now()+'_'+Math.random().toString(16).slice(2)+'.'+ext);await ref.put(file);return await ref.getDownloadURL();}
/* ===== 課文逐句切割（用對話朗讀檔，學生逐句跟讀播真人聲音） ===== */
function dlgSentences(i){const t=document.querySelector('.dlg-content-in[data-i="'+i+'"]');const txt=t?t.value:((DLG[i]&&DLG[i].content)||'');return (txt||'').replace(/\r/g,'').split('\n').flatMap(line=>(line.match(/[^。！？!?；;]+[。！？!?；;]*/g)||[])).map(s=>s.trim()).filter(s=>s&&/[㐀-鿿]/.test(s));}
H.pickDlgAudio=(i)=>{const f=document.getElementById('file-dlgaud-'+i);if(f){f.dataset.di=i;f.click();}};
async function dlgAudioHandle(file,i){const d=DLG[i];if(!d)return;const st=document.getElementById('dlgaud-status-'+i);if(st)st.textContent='讀取與分析中…';
  if(d._la&&d._la.url){try{URL.revokeObjectURL(d._la.url);}catch(_){}}
  let loud;try{const ab=await file.arrayBuffer();const ctx=new (window.AudioContext||window.webkitAudioContext)();const buf=await ctx.decodeAudioData(ab);ctx.close&&ctx.close();loud=_loudness(buf);}
  catch(e){if(st)st.textContent='無法讀取音檔：'+(e.message||e);return;}
  const sents=dlgSentences(i);if(!sents.length){if(st)st.textContent='請先在上面「課文／對話」輸入內容（會依句號切句），再上傳朗讀檔。';return;}
  const a=vaAutoStart(loud,sents.length);
  d._la={file,url:URL.createObjectURL(file),loud,start:a.start,ms:a.ms,segs:_gate(loud,_thr(loud),a.ms,0.12,a.start)};
  laRenderPreview(i);}
function laRenderPreview(i){const d=DLG[i];if(!d||!d._la)return;const sents=dlgSentences(i);let segs=d._la.segs||[];
  if(segs.length!==sents.length){const a=[];let cur=0;for(let k=0;k<sents.length;k++){if(segs[k]){a.push({s:+segs[k].s,e:+segs[k].e});cur=segs[k].e;}else{a.push({s:+cur.toFixed(2),e:+(cur+1.5).toFixed(2)});cur+=2;}}d._la.segs=a;segs=a;}
  const st=document.getElementById('dlgaud-status-'+i);if(st)st.textContent='共 '+sents.length+' 句。每句可直接改「開始～結束」秒數，▶ 試聽確認；存檔後學生逐句跟讀就會播這真人聲音。';
  const pv=document.getElementById('la-preview-'+i);if(pv)pv.innerHTML='<div class="va-list">'+sents.map((s,k)=>{const sg=segs[k]||{s:0,e:1};return `<div class="va-row"><span class="hint" style="min-width:18px">${k+1}</span><span class="la-sent">${esc(s.length>16?s.slice(0,16)+'…':s)}</span><input class="la-time" type="number" step="0.1" min="0" data-di="${i}" data-k="${k}" data-edge="s" value="${(+sg.s).toFixed(2)}"><span class="va-dash">–</span><input class="la-time" type="number" step="0.1" min="0" data-di="${i}" data-k="${k}" data-edge="e" value="${(+sg.e).toFixed(2)}"><button class="btn btn-sm" type="button" data-act="laPlay" data-id="${i}::${k}">▶ 試聽</button></div>`;}).join('')+'</div>';}
H.laPlay=(key)=>{const p=String(key).split('::');const i=+p[0],k=+p[1];const d=DLG[i];if(!d||!d._la)return;const seg=(d._la.segs||[])[k];if(!seg||!d._la.url)return;const a=window._laAudio||(window._laAudio=new Audio());a.ontimeupdate=null;a.src=d._la.url;const go=()=>{try{a.currentTime=seg.s;}catch(_){}a.ontimeupdate=()=>{if(a.currentTime>=seg.e){a.pause();a.ontimeupdate=null;}};a.play().catch(()=>{});};if(a.readyState>=1)go();else a.onloadedmetadata=go;};
document.addEventListener('change',(e)=>{const id=(e.target&&e.target.id)||'';let m=id.match(/^file-va-(\d+)$/);if(m){const f=e.target.files&&e.target.files[0];if(f)vaHandleFile(f,+m[1]);return;}m=id.match(/^file-dlgaud-(\d+)$/);if(m){const f=e.target.files&&e.target.files[0];if(f)dlgAudioHandle(f,+m[1]);}});
document.addEventListener('input',(e)=>{const m=((e.target&&e.target.id)||'').match(/^va-(?:sens|trim)-(\d+)$/);if(m){H.vaRedetect(+m[1]);return;}
  const t=e.target;if(t&&t.classList){const v=parseFloat(t.value);
    if(t.classList.contains('va-time')){const d=DLG[+t.dataset.di];if(d&&d._va&&d._va.segs&&d._va.segs[+t.dataset.k]&&!isNaN(v))d._va.segs[+t.dataset.k][t.dataset.edge]=v;}
    else if(t.classList.contains('la-time')){const d=DLG[+t.dataset.di];if(d&&d._la&&d._la.segs&&d._la.segs[+t.dataset.k]&&!isNaN(v))d._la.segs[+t.dataset.k][t.dataset.edge]=v;}}});
document.addEventListener('change',(e)=>{const t=e.target;if(!t)return;if((t.classList&&(t.classList.contains('sched-d')||t.classList.contains('sched-s')||t.classList.contains('sched-e')))||t.id==='f-first-date')refreshFirstSlot();if(t.id==='cl-date')clFillSlot();});

document.addEventListener('click',(e)=>{
  if(e.target.matches('[data-overlay]')){closeModal();return;}
  const qt=e.target.closest('[data-qetype]');
  if(qt){QE_TYPE=qt.dataset.qetype;$$('#qe-typeseg button').forEach(b=>b.classList.toggle('on',b.dataset.qetype===QE_TYPE));$('#qe-fields').innerHTML=qeFieldsHTML(QE_TYPE,{});return;}
  const b=e.target.closest('[data-act]');if(!b)return;
  const fn=H[b.dataset.act];if(fn){e.preventDefault();fn(b.dataset.id,b);}
});
document.addEventListener('change',async(e)=>{
  const inp=e.target;if(!inp||!inp.classList)return;
  const isPic=inp.classList.contains('pic-file'), isAudio=inp.classList.contains('audio-file');
  if(!isPic&&!isAudio)return;
  const file=inp.files&&inp.files[0];if(!file)return;
  const target=document.getElementById(inp.dataset.target),status=document.getElementById(inp.dataset.status);
  const setS=v=>{if(status)status.textContent=v;};
  if(!(window.firebase&&firebase.storage)){setS('未連 Firebase Storage，無法上傳；可改貼網址。');return;}
  const maxMB=isPic?10:25;
  if(file.size>maxMB*1024*1024){setS('檔案太大（上限 '+maxMB+'MB），請壓縮或改貼網址。');return;}
  try{await ensureAuthFresh();}catch(err){setS(err.message);return;}
  try{setS('上傳中… 0%');
    const safe=file.name.replace(/[^\w.\-]/g,'_');
    const ref=firebase.storage().ref((isPic?'images/':'audio/')+Date.now()+'_'+safe);
    const task=ref.put(file);
    task.on('state_changed',snap=>{const p=Math.round(snap.bytesTransferred/snap.totalBytes*100);setS('上傳中… '+p+'%');});
    await task;
    const url=await ref.getDownloadURL();
    if(target)target.value=url;
    if(isPic&&inp.dataset.preview){const pv=document.getElementById(inp.dataset.preview);if(pv){pv.src=url;pv.classList.remove('hide');}}
    setS('✓ 上傳完成');
  }catch(err){setS('上傳失敗：'+((err&&err.message)||err));}
});

const useAuth=!!(window.firebase&&firebase.auth&&window.FIREBASE_CONFIG&&window.FIREBASE_CONFIG.apiKey);
const TEACHER_EMAIL=(window.TEACHER_EMAIL||'').toLowerCase();
/* ===== 管理員（主管理員 + 共用管理員）===== */
async function listAdmins(){try{return await DB.list('admins');}catch(e){return [];}}
async function emailAllowed(email){email=(email||'').toLowerCase();if(!email)return false;if(email===TEACHER_EMAIL)return true;const list=await listAdmins();return list.some(a=>(a.email||'').toLowerCase()===email);}
function isOwner(){try{const u=firebase.auth().currentUser;return !!(u&&(u.email||'').toLowerCase()===TEACHER_EMAIL);}catch(e){return false;}}
function updateAdminBtn(){const b=document.getElementById('admin-btn');if(b)b.classList.toggle('hide',!isOwner());}
function adminWriteErr(err){const m=(((err&&(err.code||err.message))||'')+'').toLowerCase();if(/permission|insufficient|unauth/.test(m))return '無法寫入：請先到 Firebase 後台加上「admins」集合的安全規則（見設定說明）。';return (err&&err.message)||'操作失敗';}
function authErr(e){const c=(e&&e.code)||'';
  if(c.indexOf('wrong-password')>=0||c.indexOf('invalid-credential')>=0)return '密碼不正確';
  if(c.indexOf('user-not-found')>=0)return '查無此帳號';
  if(c.indexOf('invalid-email')>=0)return 'Email 格式不正確';
  if(c.indexOf('too-many-requests')>=0)return '嘗試太多次，請稍後再試';
  return (e&&e.message)||'登入失敗';}
function boot(){$('#app-name').textContent=window.APP_NAME||'華語線上作業簿';$('#gate-sub').textContent=window.APP_NAME||'華語線上作業簿';
  const tag=$('#mode-tag');if(DB.mode!=='local'){tag.textContent='● 雲端同步';tag.classList.remove('demo');}else{tag.textContent='● 示範模式（本機）';tag.classList.add('demo');}
  if(useAuth){$('#f-email-wrap').classList.remove('hide');$('#gate-forgot').classList.remove('hide');if(window.TEACHER_EMAIL)$('#gate-email').value=window.TEACHER_EMAIL;}}
function showLoad(b,soft){let el=document.getElementById('app-loading');if(b){if(!el){el=document.createElement('div');el.id='app-loading';el.className='loading-overlay'+(soft?' soft':'');el.innerHTML='<div class="spinner"></div>';document.body.appendChild(el);}}else if(el){el.remove();}}
async function enter(){$('#gate').classList.add('hide');$('#app').classList.remove('hide');showLoad(true);try{await loadAll();render();}catch(e){toast('讀取失敗：'+e.message);}finally{showLoad(false);}}
async function tryLogin(){
  if(useAuth){const email=$('#gate-email').value.trim(),pw=$('#gate-pw').value;
    if(!email||!pw){$('#gate-err').textContent='請輸入 Email 與密碼';return;}
    $('#gate-err').textContent='登入中…';
    try{const cred=await firebase.auth().signInWithEmailAndPassword(email,pw);
      if(!(await emailAllowed(cred.user.email))){await firebase.auth().signOut();$('#gate-err').textContent='此帳號沒有管理權限';return;}
      $('#gate-err').textContent='';
    }catch(e){$('#gate-err').textContent=authErr(e);}
  }else{const pw=$('#gate-pw').value;if(pw&&pw===(window.TEACHER_PASSWORD||'')){sessionStorage.setItem('teacher_ok','1');enter();}else{$('#gate-err').textContent='密碼不正確';}}
}
async function forgot(){const email=$('#gate-email').value.trim()||window.TEACHER_EMAIL||'';
  if(!email){$('#gate-err').textContent='請先輸入 Email';return;}
  try{await firebase.auth().sendPasswordResetEmail(email);toast('已寄出重設密碼信，請到信箱收信（含垃圾信匣）');$('#gate-err').textContent='';}
  catch(e){$('#gate-err').textContent=authErr(e);}}
$('#gate-btn').addEventListener('click',tryLogin);
$('#gate-forgot').addEventListener('click',forgot);
$('#gate-pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
$('#stu-search').addEventListener('input',e=>{S.q=e.target.value.trim();renderStudents();});
boot();
function authBanner(show){let b=document.getElementById('auth-warn');if(show){if(!b){b=document.createElement('div');b.id='auth-warn';b.className='auth-warn';b.innerHTML='⚠️ 登入已失效，目前無法儲存。請<b>開新分頁登入教師頁</b>，再回到這個分頁按一次儲存（<u>不要重新整理</u>，正在編輯的內容才不會不見）。 <button class="btn btn-sm" data-act="reloginTab">開新分頁登入</button>';document.body.insertBefore(b,document.body.firstChild);}}else if(b){b.remove();}}
H.reloginTab=()=>{window.open('teacher.html','_blank');};
if(useAuth){firebase.auth().onAuthStateChanged(async function(user){const ok=user&&await emailAllowed(user.email);
  if(ok){authBanner(false);updateAdminBtn();if($('#app').classList.contains('hide'))enter();}
  else if(!$('#app').classList.contains('hide')){authBanner(true);}});}
else{if(sessionStorage.getItem('teacher_ok')==='1')enter();}
// 保持登入新鮮：每 18 分鐘刷新一次 token，避免長時間編輯後突然無法儲存
setInterval(function(){try{const u=window.firebase&&firebase.auth&&firebase.auth().currentUser;if(u)u.getIdToken(true).catch(function(){});}catch(e){}},18*60*1000);
if('serviceWorker'in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
